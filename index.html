<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚雲端下料系統</title>
    
    <!-- 核心套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); transform: scale(1); }

        }
        .virtual-list { max-height: 55vh; overflow-y: auto; }

    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-6 text-center">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <h2 class="text-xl font-black tracking-widest uppercase italic">Zhiyang Pro 啟動中</h2>
            <p class="text-slate-500 text-xs mt-2 uppercase">Google Cloud Safety Booting...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, getDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [appId, setAppId] = useState('od-survey-system');
            const [measurements, setMeasurements] = useState([]);
            const [isRecording, setIsRecording] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [timer, setTimer] = useState(0);
            const [videoUrl, setVideoUrl] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [hasRescue, setHasRescue] = useState(false);

            const mediaRecorder = useRef(null);
            const timerRef = useRef(null);
            const fileInputRef = useRef(null);

            const [header, setHeader] = useState({
                company: "歐德", contact: "王廷羽",
                address: "桃園市中壢區青商路419號14樓",
                orderNo: "20260412", phone: "0923390718",
                date: new Date().toISOString().split('T')[0]
            });

            // 1. 系統啟動與防滑掉救援
            useEffect(() => {
                const init = async () => {
                    try {
                        const config = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
                        const app = window.FB.initializeApp(config);
                        const auth = window.FB.getAuth(app);
                        const firestore = window.FB.getFirestore(app);
                        const aid = typeof __app_id !== 'undefined' ? __app_id : 'od-official-app';
                        setDb(firestore); setAppId(aid);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                        } else { await window.FB.signInAnonymously(auth); }

                        window.FB.onAuthStateChanged(auth, (u) => {
                            setUser(u); setIsReady(true);
                            const rescue = localStorage.getItem('od_rescue_v15');
                            if (rescue) setHasRescue(true);
                            if (u && header.orderNo) loadCloud(firestore, aid, header.orderNo);
                        });
                    } catch (e) { setIsReady(true); }
                };
                setTimeout(init, 500);

                window.onbeforeunload = (e) => {
                    if (measurements.length > 0) {
                        e.preventDefault();
                        return "資料尚未同步，確定離開？";
                    }
                };
            }, []);

            // 自動存入本地 (每當數據變動)
            useEffect(() => {
                if (measurements.length > 0) {
                    localStorage.setItem('od_rescue_v15', JSON.stringify({ header, items: measurements }));
                }
            }, [measurements, header]);

            const recover = () => {
                const backup = JSON.parse(localStorage.getItem('od_rescue_v15'));
                if (backup) {
                    setHeader(backup.header);
                    setMeasurements(backup.items);
                    setHasRescue(false);
                }
            };

            // 2. 雲端同步
            const loadCloud = async (fdb, aid, oNo) => {
                if (!fdb || !oNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(fdb, 'artifacts', aid, 'public', 'data', 'cases', oNo);
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) {
                        const d = snap.data();
                        setHeader(prev => ({ ...prev, ...d, orderNo: oNo }));
                        setMeasurements(d.items || []);
                    }
                } catch (e) { console.error(e); } finally { setIsLoading(false); }
            };

            const syncToGoogle = async (toSave = measurements) => {
                if (!db || !user || !header.orderNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', appId, 'public', 'data', 'cases', header.orderNo);
                    await window.FB.setDoc(docRef, { ...header, items: toSave, count: toSave.length, updatedAt: new Date().toISOString() });
                    localStorage.removeItem('od_rescue_v15');
                    alert("Google 雲端已同步！");
                } catch (e) { alert("同步失敗"); }
                finally { setIsLoading(false); }
            };

            // 3. 核心功能：手動新增 (保證可用)
            const handleAddManual = () => {
                const newRow = {
                    id: Date.now() + Math.random(),
                    no: (measurements.length + 1) + ".",
                    w: 0, h: 0, dw: 0, dh: 0, t: 0, body: 0,
                    style: "房", stop: "隱", note: ""
                };
                setMeasurements(prev => [...prev, newRow]);
            };

            const handleUpdate = (id, f, v) => {
                setMeasurements(prev => prev.map(m => {
                    if (m.id === id) {
                        let u = { ...m, [f]: v };
                        if (f === 'w') u.dw = v ? parseInt(v) - 48 : 0;
                        if (f === 'h') u.dh = v ? parseInt(v) - 30 : 0;
                        if (f === 't') u.body = v;
                        return u;
                    }
                    return m;
                }));
            };

            // 4. 語音報數 (支援斜線快速報法)
            const handleRecording = async () => {
                if (isRecording) {
                    mediaRecorder.current.stop();
                    mediaRecorder.current.stream.getTracks().forEach(t => t.stop());
                    setIsRecording(false);
                    clearInterval(timerRef.current);
                } else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder.current = new MediaRecorder(s);
                        const chunks = [];
                        mediaRecorder.current.ondataavailable = e => chunks.push(e.data);
                        mediaRecorder.current.onstop = () => processVoice(new Blob(chunks, { type: 'audio/webm' }));
                        mediaRecorder.current.start();
                        setIsRecording(true);
                        setTimer(0);
                        timerRef.current = setInterval(() => setTimer(p => p + 1), 1000);
                    } catch (e) { alert("麥克風未授權"); }
                }
            };

            const processVoice = async (blob) => {
                setIsLoading(true);
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64 = reader.result.split(',')[1];
                    const apiKey = ""; 
                    const prompt = `提取智揚數據。支援斜線報法：洞寬/洞高/牆厚/樣式/門止/備註。規則：門寬=洞寬-48, 門高=洞高-30。JSON: {"items":[{"no":"1.","w":898,"h":2190,"t":125,"style":"房",
