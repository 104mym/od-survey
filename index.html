<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>丈量尺寸 - 官方旗艦優化版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .record-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .virtual-list { max-height: 55vh; overflow-y: auto; }
        input:focus, textarea:focus { border-color: #2563eb !important; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .section-title { border-left: 6px solid #2563eb; padding-left: 14px; font-weight: 900; color: #1e293b; letter-spacing: 1px; font-size: 1.5rem; }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 14px; padding: 4px 8px; border-radius: 6px; font-weight: 900; }
        .card { background: white; border-radius: 2.5rem; box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
        
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, getStorage, ref, uploadBytesResumable, getDownloadURL };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 安全圖示元件
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const temp = document.createElement('div');
                    temp.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: temp });
                    const svg = temp.querySelector('svg');
                    if (svg) {
                        if (className) className.split(' ').forEach(c => { if (c.trim()) svg.classList.add(c.trim()); });
                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const apiKey = ""; // 系統動態注入

        const App = () => {
            const [view, setView] = useState("main"); 
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [storage, setStorage] = useState(null);
            const [measurements, setMeasurements] = useState([]);
            const [allCases, setAllCases] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [mode, setMode] = useState("Cloud");
            
            const [videoUrl, setVideoUrl] = useState(null); 
            const [uploadProgress, setUploadProgress] = useState(0); 
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [logoImgBase64, setLogoImgBase64] = useState("");
            const [timer, setTimer] = useState(0);

            const recognitionRef = useRef(null);
            const fileInputRef = useRef(null);
            const transcriptAccumulator = useRef(""); 

            const FIREBASE_APP_ID = 'od-survey-system';

            const getTodayDateStr = () => {
                const now = new Date();
                return `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}`;
            };

            const [header, setHeader] = useState({
                orderNo: getTodayDateStr(),
                address: "桃園市中壢區青商路419號14樓",
                contact: "王廷羽", phone: "0923390718", surveyor: "教父", company: "歐德",
                frameStyle: "同門片", doorStyle: "平烤正白",
                precautions: "無", orderRemark: "無",
                redNotice: "門下大陸 / 框工廠切\n多帶一組 一字門檔",
                partCollision: "\n白色\n\n", 
                partHinge: "\n銀色子母\n\n", 
                partStop: "銀色\n隱形\n一字\n", 
                partHandle: "黑色\n\n貝-WING\n",
                deposit: "0",
                videoLink: "" 
            });

            // 1. 初始化 Firebase 與 Auth
            useEffect(() => {
                const init = async () => {
                    try {
                        const firebaseConfig = {
                            apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                            authDomain: "tao-men.firebaseapp.com",
                            projectId: "tao-men",
                            storageBucket: "tao-men.firebasestorage.app",
                            messagingSenderId: "332609297071",
                            appId: "1:332609297071:web:03593a930475c97b87525a"
                        };
                        const app = window.FB.initializeApp(firebaseConfig);
                        const firestore = window.FB.getFirestore(app);
                        const storageInstance = window.FB.getStorage(app);
                        const auth = window.FB.getAuth(app);
                        
                        setDb(firestore);
                        setStorage(storageInstance);

                        // 登入守衛
                        await window.FB.signInAnonymously(auth);
                        window.FB.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            if (u) {
                                setMode("Cloud");
                                fetchHistory(firestore);
                            }
                        });
                        setIsReady(true);
                    } catch (e) { 
                        console.error("Firebase Init Error", e);
                        setMode("Local");
                        setIsReady(true); 
                    }
                };
                init();
                getLogoBase64().then(url => setLogoImgBase64(url));

                // 2. 語音辨識初始化
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true; 
                    recognitionRef.current.interimResults = true; 
                    recognitionRef.current.lang = 'zh-TW';
                    recognitionRef.current.onresult = (e) => {
                        let interim = "";
                        let finalStr = "";
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            if (e.results[i].isFinal) finalStr += e.results[i][0].transcript;
                            else interim += e.results[i][0].transcript;
                        }
                        if (finalStr) transcriptAccumulator.current += finalStr + " ";
                        setTranscript(transcriptAccumulator.current + interim);
                    };
                    recognitionRef.current.onerror = () => setIsRecording(false);
                }
            }, []);

            useEffect(() => {
                let interval;
                if (isRecording) interval = setInterval(() => setTimer(prev => prev + 1), 1000);
                else clearInterval(interval);
                return () => clearInterval(interval);
            }, [isRecording]);

            const fetchHistory = (fdb) => {
                if (!fdb) return;
                const colRef = window.FB.collection(fdb, 'artifacts', FIREBASE_APP_ID, 'public', 'data', 'cases');
                window.FB.onSnapshot(colRef, (snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllCases(list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)));
                }, (err) => console.error("Snapshot error", err));
            };

            // 🚀 核心升級：AI 強大解析與帶入邏輯 (包含重試與暴力解析)
            const parseSpeech = async (text) => {
                if (!text.trim()) return;
                setIsLoading(true);
                
                const systemPrompt = `你是一位丈量秘書。請將語音解析並回傳 JSON。
                1. 提取到 address(地址), orderNo(編號), partHandle(把手), partCollision(防撞條), precautions(注意事項), note(清單備註) 等欄位。
                2. 清單(items) 是陣列，包含 no, w(洞寬), h(洞高), t(牆厚), note。
                3. 計算：門寬=洞寬-48, 門高=洞高-30。牆厚=主體。
                
                範例：{"header":{"address":"青商路"},"items":[{"no":"1.","w":898,"h":2190,"t":125}]}`;

                const delays = [1000, 2000, 4000, 8000, 16000];
                const callAI = async (retryCount = 0) => {
                    try {
                        const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `語音內容：${text}` }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        if (!resp.ok) throw new Error("API_FAIL");
                        return await resp.json();
                    } catch (err) {
                        if (retryCount < 4) {
                            await new Promise(r => setTimeout(r, delays[retryCount]));
                            return callAI(retryCount + 1);
                        }
                        throw err;
                    }
                };

                try {
                    const data = await callAI();
                    const rawText = data.candidates[0].content.parts[0].text;
                    
                    // 🛡️ 暴力 JSON 提取：從整段文字挖出第一個 { 和最後一個 }
                    const start = rawText.indexOf('{');
                    const end = rawText.lastIndexOf('}');
                    if (start === -1) throw new Error("NO_JSON");
                    const result = JSON.parse(rawText.substring(start, end + 1));
                    
                    // 自動填入標頭
                    if (result.header) {
                        setHeader(prev => ({ ...prev, ...result.header }));
                    }

                    // 自動填入清單並同步雲端
                    if (result.items && Array.isArray(result.items)) {
                        const newRows = result.items.map((i, idx) => ({
                            id: Date.now() + Math.random(),
                            no: i.no || (measurements.length + idx + 1) + ".",
                            w: parseInt(i.w) || 0, h: parseInt(i.h) || 0,
                            dw: i.w ? i.w - 48 : 0, dh: i.h ? i.h - 30 : 0,
                            t: parseInt(i.t) || 0, body: parseInt(i.t) || 0, trim: 50, note: i.note || ""
                        }));
                        const finalMeasurements = [...measurements, ...newRows];
                        setMeasurements(finalMeasurements);
                        
                        // 雲端同步
                        if (mode === "Cloud") {
                            const docRef = window.FB.doc(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', 'cases', header.orderNo);
                            await window.FB.setDoc(docRef, { ...header, ...result.header, items: finalMeasurements, updatedAt: new Date().toISOString() });
                        }
                    }
                } catch (e) {
                    console.error("AI Parse Error", e);
                    alert("AI 秘書解析失敗。請嘗試：\n1. 網路是否穩定\n2. 講話速度放慢\n3. 手動輸入重要數據");
                } finally {
                    setIsLoading(false);
                    transcriptAccumulator.current = "";
                    setTranscript("");
                }
            };

            const toggleRecording = () => {
                if (!recognitionRef.current) return alert("您的瀏覽器不支援語音辨識");
                if (isRecording) {
                    recognitionRef.current.stop();
                    setIsRecording(false);
                    if (transcriptAccumulator.current) parseSpeech(transcriptAccumulator.current);
                } else {
                    transcriptAccumulator.current = "";
                    setTranscript("");
                    recognitionRef.current.start();
                    setIsRecording(true);
                    setTimer(0);
                }
            };

            const handleUpdateRow = (id, field, val) => {
                setMeasurements(prev => prev.map(m => {
                    if (m.id === id) {
                        let u = { ...m, [field]: val };
                        if (field === 'w') u.dw = val ? parseInt(val) - 48 : 0;
                        if (field === 'h') u.dh = val ? parseInt(val) - 30 : 0;
                        if (field === 't') u.body = val;
                        return u;
                    }
                    return m;
                }));
            };

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 200, 200);
                    ctx.beginPath(); ctx.arc(100, 85, 70, 0, 2 * Math.PI);
                    ctx.lineWidth = 14; ctx.strokeStyle = 'black'; ctx.stroke();
                    ctx.font = '900 90px serif'; ctx.fillStyle = 'black';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 100, 95);
                    ctx.font = '900 24px sans-serif'; ctx.fillText('門扉美學館', 100, 185);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            const loadCase = (c) => { setHeader({ ...c }); setMeasurements(c.items || []); setVideoUrl(null); setView("main"); };

            if (!isReady) return (
                <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white">
                    <Icon name="loader-2" className="animate-spin w-12 h-12 mb-4 text-blue-500" />
                    <h1 className="font-black tracking-widest uppercase italic">丈量系統 啟動中...</h1>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col pb-20 relative">
                    <nav className="bg-slate-900 text-white p-5 shadow-xl sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-3" onClick={() => setView("main")}>
                            {logoImgBase64 ? <div className="bg-white p-1 rounded-xl shadow-lg"><img src={logoImgBase64} className="w-10 h-10 object-contain" /></div> : <div className="bg-blue-600 p-2 rounded-xl"><Icon name="shield-check" className="w-7 h-7" /></div>}
                            <div><h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">丈量尺寸</h1><span className="text-[10px] font-bold text-emerald-400 tracking-widest uppercase">{mode} Mode</span></div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setView(view === 'main' ? 'history' : 'main')} className="bg-slate-800 text-white px-5 py-3 rounded-2xl text-sm font-black flex items-center gap-2 active:scale-95 transition-all"><Icon name={view === 'main' ? "list" : "chevron-left"} className="w-5 h-5" /> {view === 'main' ? "紀錄" : "返回"}</button>
                            <button onClick={() => parseSpeech(transcriptAccumulator.current)} className="bg-blue-600 text-white px-5 py-3 rounded-2xl text-sm font-black shadow-lg active:scale-95 transition-all">同步雲端</button>
                        </div>
                    </nav>

                    {view === "main" ? (
                        <main className="p-4 lg:p-8 max-w-7xl mx-auto w-full space-y-8">
                            <div className="card p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                                <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">訂單編號</label><input value={header.orderNo} onChange={e=>setHeader({...header, orderNo: e.target.value})} className="w-full border-b-2 p-1 text-2xl font-black text-blue-600 outline-none" /></div>
                                <div className="lg:col-span-2 space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">案場地址 (可語音解析)</label><input value={header.address} onChange={e=>setHeader({...header, address: e.target.value})} className="w-full border-b-2 p-1 text-2xl font-bold outline-none" /></div>
                                <div className="space-y-1 text-center"><label className="text-[10px] font-black text-red-500 uppercase">影片連動</label>
                                    <button onClick={()=>fileInputRef.current.click()} className="w-full bg-slate-50 py-3 rounded-2xl text-[10px] font-black border flex items-center justify-center gap-2 transition-all">
                                        <Icon name="upload" className="w-5 h-5" /> 選取影片
                                    </button>
                                    <input type="file" ref={fileInputRef} hidden accept="video/*" />
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-[3.5rem] p-12 text-center relative overflow-hidden shadow-2xl border-8 border-white">
                                {isLoading && <div className="absolute inset-0 bg-slate-900/95 z-30 flex flex-col items-center justify-center"><Icon name="loader-2" className="animate-spin text-blue-500 w-20 h-20 mb-4" /><p className="text-blue-400 font-black tracking-widest text-lg animate-pulse uppercase italic">AI 正在自動帶入格子...</p></div>}
                                <button onClick={toggleRecording} className={`w-40 h-40 rounded-full flex items-center justify-center mx-auto transition-all border-[14px] border-slate-800 shadow-2xl ${isRecording ? 'record-pulse' : 'bg-white hover:scale-105'}`}>
                                    {isRecording ? <div className="w-12 h-12 bg-white rounded-xl"></div> : <Icon name="mic" className="w-20 h-20 text-slate-900" />}
                                </button>
                                {transcript && <p className="mt-8 text-white/40 text-sm font-bold italic leading-relaxed px-6 truncate">「 {transcript} 」</p>}
                            </div>

                            <div className="card overflow-hidden">
                                <div className="p-6 bg-slate-50 border-b flex justify-between items-center bg-slate-50/80">
                                    <h3 className="section-title italic">尺寸明細列表 ({measurements.length} 樘)</h3>
                                    <button onClick={() => setMeasurements([...measurements, { id: Date.now(), no: (measurements.length+1)+".", w:0, h:0, dw:0, dh:0, t:0, note:"" }])} className="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-sm font-black active:scale-95 transition-all">+ 手動新增</button>
                                </div>
                                <div className="overflow-x-auto no-scrollbar">
                                    <table className="w-full text-left min-w-[1100px] border-separate border-spacing-0">
                                        <thead className="bg-slate-50 text-[10px] text-slate-400 font-black uppercase sticky top-0 z-20 shadow-sm border-b">
                                            <tr><th className="px-8 py-6">編號</th><th className="px-4 py-6 text-blue-700">洞寬</th><th className="px-4 py-6 text-blue-700">洞高</th><th className="px-4 py-6 text-emerald-600 border-x">門寬(-48)</th><th className="px-4 py-6 text-emerald-600 border-r">門高(-30)</th><th className="px-4 py-6 text-center font-black">牆厚</th><th className="px-8 py-6">備註</th><th className="px-4 py-6 w-24"></th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {measurements.map(m => (
                                                <tr key={m.id} className="hover:bg-blue-50/20 group">
                                                    <td className="px-8 py-6 font-bold text-slate-400 text-xl italic">{m.no}</td>
                                                    <td className="px-4 py-6"><input type="number" value={m.w} onChange={e=>handleUpdateRow(m.id, 'w', e.target.value)} className="w-full bg-transparent border-none p-0 text-2xl font-black text-blue-800 focus:ring-0" /></td>
                                                    <td className="px-4 py-6"><input type="number" value={m.h} onChange={e=>handleUpdateRow(m.id, 'h', e.target.value)} className="w-full bg-transparent border-none p-0 text-2xl font-black text-blue-800 focus:ring-0" /></td>
                                                    <td className="px-4 py-6 bg-emerald-50/10 font-black text-emerald-600 text-4xl tracking-tighter text-center border-x">{m.dw}</td>
                                                    <td className="px-4 py-3 bg-emerald-50/10 font-black text-emerald-600 text-4xl tracking-tighter text-center border-r">{m.dh}</td>
                                                    <td className="px-4 py-6"><input type="number" value={m.t} onChange={e=>handleUpdateRow(m.id, 't', e.target.value)} className="w-full bg-transparent border-none p-0 text-2xl font-bold text-center focus:ring-0" /></td>
                                                    <td className="px-8 py-6"><input value={m.note} onChange={e=>handleUpdateRow(m.id, 'note', e.target.value)} className="w-full bg-transparent border-none p-0 text-sm text-slate-500 font-bold italic focus:ring-0" placeholder="點此輸入備註..." /></td>
                                                    <td className="px-4 py-6 text-center"><button onClick={() => setMeasurements(measurements.filter(x=>x.id!==m.id))} className="text-slate-300 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100 p-2"><Icon name="trash-2" className="w-6 h-6" /></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div className="card p-10 space-y-10">
                                <h3 className="section-title italic tracking-widest uppercase">五金配件與詳細備註</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="space-y-6">
                                        <div className="space-y-2"><label className="text-[10px] font-black text-blue-500 uppercase tracking-widest">注意事項</label><textarea rows="2" value={header.precautions} onChange={e=>setHeader({...header, precautions:e.target.value})} className="w-full bg-slate-50 border rounded-2xl p-5 text-xl font-bold resize-none" /></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black text-blue-500 uppercase tracking-widest">訂單備註</label><textarea rows="2" value={header.orderRemark} onChange={e=>setHeader({...header, orderRemark:e.target.value})} className="w-full bg-slate-50 border rounded-2xl p-5 text-xl font-bold resize-none" /></div>
                                    </div>
                                    <div className="space-y-2"><label className="text-[10px] font-black text-red-500 italic font-black uppercase tracking-widest">大紅字警示區</label><textarea rows="5" value={header.redNotice} onChange={e=>setHeader({...header, redNotice:e.target.value})} className="w-full bg-red-50/30 border border-red-100 rounded-[2.5rem] p-6 text-red-600 font-black text-4xl text-center resize-none leading-relaxed shadow-inner" /></div>
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-8">
                                    {['partCollision','partHinge','partStop','partHandle'].map((key, i) => (
                                        <div key={key} className="bg-slate-50 p-6 rounded-3xl border border-slate-200 shadow-sm">
                                            <label className="text-[10px] font-black text-slate-400 mb-3 block uppercase tracking-widest">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                            <textarea rows="4" value={header[key]} onChange={e=>setHeader({...header, [key]:e.target.value})} className="w-full bg-white border rounded-2xl p-4 text-2xl font-black outline-none resize-none text-center leading-loose text-slate-700 shadow-inner" placeholder="AI 自動解析處" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    ) : (
                        <main className="p-4 lg:p-8 max-w-5xl mx-auto w-full">
                            <div className="card">
                                <div className="p-8 bg-slate-900 text-white flex justify-between items-center rounded-t-[2.5rem] shadow-xl"><h3 className="font-black italic uppercase text-2xl tracking-widest">存檔歷史紀錄</h3><span className="bg-blue-600 px-4 py-1 rounded-full text-xs font-black">{allCases.length} 案存檔</span></div>
                                <div className="divide-y divide-slate-100">
                                    {allCases.map(c => (
                                        <div key={c.id} className="p-8 hover:bg-blue-50/30 transition-all flex justify-between items-center cursor-pointer group" onClick={() => loadCase(c)}>
                                            <div className="space-y-1"><p className="text-blue-600 font-black text-3xl mb-1 tracking-tighter">[{c.orderNo}]</p><p className="text-xl font-bold text-slate-500">{c.address}</p><p className="text-[10px] text-slate-400 font-black uppercase mt-2 italic">Synced: {new Date(c.updatedAt).toLocaleString()}</p></div>
                                            <Icon name="chevron-right" className="w-12 h-12 text-slate-200 group-hover:text-blue-500 transition-colors" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
