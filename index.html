<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚雲端下料助手 - 終極旗艦版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .record-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .virtual-list { max-height: 55vh; overflow-y: auto; }
        input:focus, textarea:focus { border-color: #2563eb !important; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .section-title { border-left: 6px solid #2563eb; padding-left: 14px; font-weight: 900; color: #1e293b; letter-spacing: 1px; font-size: 1.25rem; }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 14px; padding: 4px 8px; border-radius: 6px; font-weight: 900; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border: 1px solid #e2e8f0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
        
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, getStorage, ref, uploadBytesResumable, getDownloadURL };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const apiKey = ""; // 執行環境自動提供

        const App = () => {
            const [view, setView] = useState("main"); 
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [storage, setStorage] = useState(null);
            const [measurements, setMeasurements] = useState([]);
            const [allCases, setAllCases] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [mode, setMode] = useState("Local");
            
            const [videoUrl, setVideoUrl] = useState(null); 
            const [uploadProgress, setUploadProgress] = useState(0); 
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const recognitionRef = useRef(null);
            const fileInputRef = useRef(null);
            const transcriptAccumulator = useRef(""); 

            const getTodayDateStr = () => {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                return `${y}${m}${d}`;
            };

            const [header, setHeader] = useState({
                orderNo: getTodayDateStr(),
                address: "桃園市中壢區青商路419號14樓",
                contact: "王廷羽", phone: "0923390718", surveyor: "教父", company: "歐德",
                frameStyle: "同門片", doorStyle: "平烤正白",
                precautions: "無", orderRemark: "無",
                redNotice: "門下大陸 / 框工廠切\n多帶一組 一字門檔",
                partCollision: "\n白色\n\n", 
                partHinge: "\n銀色子母\n\n", 
                partStop: "銀色\n隱形\n一字\n", 
                partHandle: "黑色\n\n貝-WING\n",
                deposit: "0",
                videoLink: "" 
            });

            const [timer, setTimer] = useState(0);

            const firebaseConfig = {
                apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                authDomain: "tao-men.firebaseapp.com",
                projectId: "tao-men",
                storageBucket: "tao-men.firebasestorage.app",
                messagingSenderId: "332609297071",
                appId: "1:332609297071:web:03593a930475c97b87525a"
            };

            useEffect(() => {
                let interval;
                if (isRecording) {
                    interval = setInterval(() => setTimer(prev => prev + 1), 1000);
                } else if (!isRecording && timer !== 0) {
                    clearInterval(interval);
                }
                return () => clearInterval(interval);
            }, [isRecording, timer]);

            useEffect(() => {
                const init = async () => {
                    try {
                        const app = window.FB.initializeApp(firebaseConfig);
                        const firestore = window.FB.getFirestore(app);
                        const storageInstance = window.FB.getStorage(app);
                        setDb(firestore);
                        setStorage(storageInstance);
                        
                        const auth = window.FB.getAuth(app);
                        try { await window.FB.signInAnonymously(auth); } catch(e) {}

                        window.FB.onAuthStateChanged(auth, (u) => {
                            setMode("Cloud");
                            fetchHistory(firestore);
                            setIsReady(true);
                        });
                        
                        setTimeout(() => setIsReady(true), 1000);
                    } catch (e) { 
                        setMode("Local");
                        setIsReady(true); 
                    }
                };
                init();

                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true; 
                    recognitionRef.current.interimResults = true; 
                    recognitionRef.current.lang = 'zh-TW';
                    
                    recognitionRef.current.onresult = (e) => {
                        let interim = "";
                        let finalStr = "";
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            if (e.results[i].isFinal) finalStr += e.results[i][0].transcript;
                            else interim += e.results[i][0].transcript;
                        }
                        if (finalStr) transcriptAccumulator.current += finalStr + "，";
                        setTranscript(transcriptAccumulator.current + interim);
                    };
                    
                    recognitionRef.current.onend = () => {
                        setIsRecording(false);
                        if (transcriptAccumulator.current) parseSpeech(transcriptAccumulator.current);
                    };
                    
                    recognitionRef.current.onerror = () => setIsRecording(false);
                }
            }, []);

            const fetchHistory = (fdb) => {
                try {
                    const colRef = window.FB.collection(fdb, 'artifacts', 'od-app', 'public', 'data', 'cases');
                    window.FB.onSnapshot(colRef, (snap) => {
                        const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setAllCases(list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)));
                    });
                } catch(e){}
            };

            const parseSpeech = async (text) => {
                if (!text.trim()) return;
                setIsLoading(true);
                const prompt = `你是一個專業裝潢助理。解析以下語音，裡面包含「多筆」尺寸數據。請仔細分出每一筆。輸出 JSON 格式：{"items": [{"w":洞寬, "h":洞高, "t":牆厚, "style":"房"或"浴", "note":"備註"}]}。語音內容：${text}。只回傳 JSON，不要其他文字。`;
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    const data = await resp.json();
                    const clean = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    const p = JSON.parse(clean);
                    
                    if (p.items && Array.isArray(p.items)) {
                        setMeasurements(prev => {
                            const newItems = p.items.map((item, idx) => ({
                                id: Date.now() + Math.random(),
                                no: (prev.length + idx + 1) + ".",
                                w: item.w || 0, h: item.h || 0, 
                                dw: (item.w || 0) - 48, dh: (item.h || 0) - 30, 
                                t: item.t || 0,
                                style: item.style || "房", note: item.note || ""
                            }));
                            return [...prev, ...newItems];
                        });
                    }
                } catch (e) { alert("AI 解析失敗，請手動輸入。"); }
                finally { 
                    setIsLoading(false); 
                    transcriptAccumulator.current = "";
                    setTranscript("");
                }
            };

            const toggleRecording = () => {
                if (!recognitionRef.current) return alert("您的瀏覽器不支援語音辨識");
                if (isRecording) {
                    recognitionRef.current.stop();
                    setIsRecording(false);
                } else {
                    transcriptAccumulator.current = "";
                    setTranscript("");
                    try {
                        recognitionRef.current.start();
                        setIsRecording(true);
                        setTimer(0);
                    } catch (e) { console.log(e); }
                }
            };

            const handleVideoSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setVideoUrl(URL.createObjectURL(file));

                if (!storage || mode === "Local") {
                    alert("雲端未連通，無法自動上傳。請自行上傳後貼上網址。");
                    return;
                }

                const storageRef = window.FB.ref(storage, `artifacts/od-survey-system/videos/${header.orderNo}_${Date.now()}`);
                const uploadTask = window.FB.uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        setUploadProgress(progress);
                    }, 
                    (error) => {
                        console.error(error);
                        alert("影片上傳失敗！");
                        setUploadProgress(0);
                    }, 
                    async () => {
                        const downloadURL = await window.FB.getDownloadURL(uploadTask.snapshot.ref);
                        setHeader(prev => ({...prev, videoLink: downloadURL}));
                        setUploadProgress(0);
                        alert("✅ 影片上傳完成！");
                    }
                );
            };

            const handleSync = async () => {
                if (mode === "Local") return alert("目前為單機模式，請檢查網路。");
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-app', 'public', 'data', 'cases', header.orderNo);
                    await window.FB.setDoc(docRef, { ...header, items: measurements, updatedAt: new Date().toISOString() });
                    alert("✅ 雲端同步成功！");
                } catch (e) { alert("同步失敗"); }
                finally { setIsLoading(false); }
            };

            const confirmDeleteHistory = async (orderNo) => {
                if (!db) return;
                setDeleteConfirm(null);
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-app', 'public', 'data', 'cases', orderNo);
                    await window.FB.deleteDoc(docRef);
                } catch (error) { console.error("刪除失敗", error); } 
                finally { setIsLoading(false); }
            };

            const loadCase = (c) => { 
                setHeader({ ...c }); 
                setMeasurements(c.items || []); 
                setVideoUrl(null);
                setView("main"); 
            };

            const handleUpdate = (id, field, val) => {
                setMeasurements(prev => prev.map(m => {
                    if (m.id === id) {
                        let u = { ...m, [field]: val };
                        if (field === 'w') u.dw = val ? parseInt(val) - 48 : 0;
                        if (field === 'h') u.dh = val ? parseInt(val) - 30 : 0;
                        if (field === 't') u.body = val;
                        return u;
                    }
                    return m;
                }));
            };

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 200, 200);
                    ctx.beginPath(); ctx.arc(100, 85, 70, 0, 2 * Math.PI);
                    ctx.lineWidth = 14; ctx.strokeStyle = 'black'; ctx.stroke();
                    ctx.font = '900 90px "Noto Serif TC", serif'; ctx.fillStyle = 'black';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 100, 95);
                    ctx.font = '900 24px "Noto Sans TC", sans-serif'; ctx.fillText('門扉美學館', 100, 185);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            const exportExcel = async () => {
                setIsLoading(true);
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('下料單');
                    sheet.columns = [
                        { width: 8 }, { width: 10 }, { width: 10 }, { width: 10 }, { width: 10 },
                        { width: 8 }, { width: 8 }, { width: 8 }, { width: 30 }, { width: 7 },
                        { width: 7 }, { width: 7 }
                    ];
                    const thin = { style:'thin' };
                    const borderAll = { top: thin, left: thin, bottom: thin, right: thin };

                    const tabs = ["工單扣法", "尺寸單(榮豐)", "採購單(框)", "採購單(門)", "尺寸單", "合約(未稅)"];
                    tabs.forEach((t, i) => {
                        const cell = sheet.getCell(1, i * 2 + 1);
                        cell.value = t; cell.alignment = { horizontal:'center' };
                        cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF6688AA'} };
                        cell.font = { color:{argb:'FFFFFFFF'}, bold:true, size:10 };
                        sheet.mergeCells(1, i*2+1, 1, i*2+2);
                    });

                    sheet.mergeCells('A2:A4');
                    const logoData = await getLogoBase64();
                    const imageId = workbook.addImage({ base64: logoData, extension: 'png' });
                    sheet.addImage(imageId, { tl: { col: 0, row: 1 }, br: { col: 1, row: 4 } });
                    sheet.getCell('A2').border = borderAll;

                    sheet.mergeCells('B3:H4');
                    const title = sheet.getCell('B3');
                    title.value = '下 料 單'; title.font = { size: 24, bold: true };
                    title.alignment = { vertical:'middle', horizontal:'center' };
                    sheet.getCell('I3').value = '訂單編號:'; sheet.getCell('J3').value = header.orderNo;
                    sheet.getCell('I4').value = '丈量人員:'; sheet.getCell('J4').value = header.surveyor;

                    const meta = [
                        {a:'公    司:', d:header.company, i:'丈量日期:', j:new Date().toLocaleDateString()},
                        {a:'聯 絡 人:', d:header.contact, g:'電話:', h:header.phone},
                        {a:'案場地址:', d:header.address}
                    ];
                    meta.forEach((m, idx) => {
                        const r = 5 + idx;
                        sheet.mergeCells(`A${r}:C${r}`); sheet.getCell(`A${r}`).value = m.a;
                        sheet.mergeCells(`D${r}:F${r}`); sheet.getCell(`D${r}`).value = m.d;
                        if(m.i) { sheet.getCell(`I${r}`).value = m.i; sheet.getCell(`J${r}`).value = m.j; }
                        if(m.g) { sheet.getCell(`G${r}`).value = m.g; sheet.getCell(`H${r}`).value = m.h; }
                        sheet.getRow(r).eachCell(c => c.border = borderAll);
                    });

                    sheet.getRow(9).height = 30;
                    sheet.mergeCells('A9:B9'); sheet.getCell('A9').value = "門框樣式:";
                    sheet.mergeCells('C9:F9'); sheet.getCell('C9').value = header.frameStyle;
                    sheet.mergeCells('G9:H9'); sheet.getCell('G9').value = "門片樣式:";
                    sheet.mergeCells('I9:L9'); sheet.getCell('I9').value = header.doorStyle;
                    ['A9','G9'].forEach(c => sheet.getCell(c).fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFFDE9D9'} });
                    ['C9','I9'].forEach(c => { sheet.getCell(c).fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFF4B084'} }; sheet.getCell(c).font = { bold:true, size:14 }; });

                    const hRow = sheet.getRow(11);
                    hRow.values = ['編號','洞寬','洞高','門寬','門高','牆厚','主體','線板','備註','樣式','門止','底'];
                    hRow.eachCell(c => { c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; c.border=borderAll; c.alignment={horizontal:'center'}; c.font={bold:true}; });

                    let cur = 12;
                    measurements.forEach((m) => {
                        const r = sheet.getRow(cur++);
                        r.values = [m.no, m.w, m.h, m.dw, m.dh, m.t, m.t, 50, m.note, m.style, '隱', ''];
                        r.eachCell(c => { c.border=borderAll; c.alignment={horizontal:'center', vertical:'middle'}; if(c.column===9) c.font={color:{argb:'FFFF0000'}, bold:true}; });
                    });

                    const footStart = cur + 1;
                    sheet.mergeCells(`A${footStart}:D${footStart}`); sheet.getCell(`A${footStart}`).value = "框門注意事項: " + header.precautions;
                    sheet.mergeCells(`E${footStart}:L${footStart}`); sheet.getCell(`E${footStart}`).value = "訂單備註: " + header.orderRemark;
                    sheet.getRow(footStart).eachCell(c => { c.font = { color:{argb:'FF0000FF'}, bold:true }; c.border = borderAll; });

                    const redR = footStart + 1;
                    sheet.mergeCells(`E${redR}:L${redR+4}`);
                    const redC = sheet.getCell(`E${redR}`);
                    redC.value = header.redNotice;
                    redC.font = { color:{argb:'FFFF0000'}, size:20, bold:true };
                    redC.alignment = { vertical:'middle', horizontal:'center', wrapText:true };
                    for(let r=redR; r<=redR+4; r++) {
                        for(let c=5; c<=12; c++) { sheet.getCell(r, c).border = borderAll; }
                    }

                    const pR = redR + 5;
                    const partsH = ["防撞條", "鉸鏈", "門止", "把手"];
                    const partsV = [(header.partCollision||"").split('\n'), (header.partHinge||"").split('\n'), (header.partStop||"").split('\n'), (header.partHandle||"").split('\n')];
                    partsH.forEach((p, i) => {
                        const sCol = i*2 + 5;
                        sheet.mergeCells(pR, sCol, pR, sCol+1);
                        const head = sheet.getCell(pR, sCol);
                        head.value = p; head.alignment={horizontal:'center'}; head.font={bold:true};
                    });
                    for(let rowOffset=1; rowOffset<=4; rowOffset++) {
                        partsV.forEach((lines, i) => {
                            const sCol = i*2 + 5;
                            sheet.mergeCells(pR+rowOffset, sCol, pR+rowOffset, sCol+1);
                            const val = sheet.getCell(pR+rowOffset, sCol);
                            val.value = lines[rowOffset-1] || "";
                            val.alignment={horizontal:'center', vertical:'middle'};
                        });
                    }
                    for(let r=pR; r<=pR+4; r++) {
                        for(let c=5; c<=12; c++) { sheet.getCell(r, c).border = borderAll; }
                    }

                    const fin = pR + 5;
                    sheet.mergeCells(`E${fin}:H${fin}`);
                    sheet.getCell(`E${fin}`).value = "訂金: " + header.deposit;
                    sheet.mergeCells(`I${fin}:L${fin}`);
                    sheet.getCell(`I${fin}`).value = "審核人簽章: ";
                    for(let c=5; c<=12; c++) { sheet.getCell(fin, c).border = borderAll; }

                    const buffer = await workbook.xlsx.writeBuffer();
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(new Blob([buffer]));
                    link.download = `歐德下料單_${header.orderNo}.xlsx`;
                    link.click();
                } catch(e) { console.error(e); alert("導出失敗"); } finally { setIsLoading(false); }
            };

            useEffect(() => { if (isReady) setTimeout(() => lucide.createIcons(), 100); }, [measurements, isReady, view, isRecording, videoUrl, uploadProgress]);

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white italic font-black text-3xl uppercase tracking-widest">系統啟動中...</div>;

            return (
                <div className="min-h-screen flex flex-col pb-20 relative">
                    {deleteConfirm && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
                                <h3 className="text-xl font-black text-slate-800 mb-2">確定要刪除嗎？</h3>
                                <p className="text-slate-500 font-bold mb-8">訂單 [{deleteConfirm}] 將永久刪除。</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setDeleteConfirm(null)} className="flex-1 bg-slate-100 py-3 rounded-xl font-black">取消</button>
                                    <button onClick={() => confirmDeleteHistory(deleteConfirm)} className="flex-1 bg-red-500 text-white py-3 rounded-xl font-black">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-slate-900 text-white p-5 shadow-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3" onClick={() => setView("main")}>
                                <div className="bg-blue-600 p-2 rounded-lg shadow-lg"><i data-lucide="shield-check" className="w-6 h-6"></i></div>
                                <div><h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">智揚助理</h1><span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{mode} Mode</span></div>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => setView(view === 'main' ? 'history' : 'main')} className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-sm font-black flex items-center gap-2"><i data-lucide={view === 'main' ? "list" : "chevron-left"} className="w-4 h-4"></i> {view === 'main' ? "紀錄" : "返回"}</button>
                                <button onClick={handleSync} className="bg-blue-600 text-white px-4 py-2.5 rounded-xl text-sm font-black shadow-lg flex items-center gap-2">同步雲端</button>
                            </div>
                        </div>
                    </nav>

                    {view === "main" ? (
                        <main className="p-4 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
                            <div className="card p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                                <div className="space-y-2">
                                    <label className="text-sm font-black text-slate-400 uppercase">訂單編號</label>
                                    <input value={header.orderNo} onChange={e=>setHeader({...header, orderNo: e.target.value})} className="w-full border-b-2 p-2 text-xl font-black text-blue-600 outline-none" />
                                </div>
                                <div className="lg:col-span-2 space-y-2">
                                    <label className="text-sm font-black text-slate-400 uppercase">案場地址</label>
                                    <input value={header.address} onChange={e=>setHeader({...header, address: e.target.value})} className="w-full border-b-2 p-2 text-xl font-bold outline-none" />
                                </div>
                                <div className="space-y-2 text-center">
                                    <label className="text-sm font-black text-slate-400 uppercase text-red-500 flex items-center justify-center gap-1"><i data-lucide="video" className="w-4 h-4"></i> 現場影片</label>
                                    <button onClick={()=>fileInputRef.current.click()} className="w-full bg-slate-50 py-3 rounded-xl text-sm font-black border flex items-center justify-center gap-2 transition-all">
                                        {uploadProgress > 0 && uploadProgress < 100 ? <div className="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div> : 
                                         header.videoLink ? <i data-lucide="check-circle-2" className="w-5 h-5 text-emerald-500"></i> : <i data-lucide="upload" className="w-5 h-5"></i>}
                                        {uploadProgress > 0 && uploadProgress < 100 ? `上傳中 ${Math.round(uploadProgress)}%` : header.videoLink ? "影片已選取" : "上傳影片"}
                                    </button>
                                    <input type="file" ref={fileInputRef} hidden accept="video/*" onChange={handleVideoSelect} />
                                </div>
                                <button onClick={exportExcel} className="bg-emerald-600 text-white py-3 rounded-xl text-sm font-black shadow-lg flex items-center justify-center gap-2 mt-auto active:scale-95 transition-all"><i data-lucide="file-spreadsheet" className="w-5 h-5"></i> 導出 Excel</button>
                            </div>

                            {videoUrl && (
                                <div className="bg-black rounded-[2.5rem] overflow-hidden shadow-2xl aspect-video max-w-2xl mx-auto border-8 border-white relative group">
                                    <video src={videoUrl} controls className="w-full h-full object-cover"></video>
                                    <button onClick={() => {setVideoUrl(null); setHeader({...header, videoLink: ''});}} className="absolute top-4 right-4 bg-white/20 hover:bg-red-500 text-white p-3 rounded-full backdrop-blur-md transition-all"><i data-lucide="trash-2" className="w-6 h-6"></i></button>
                                </div>
                            )}

                            <div className="bg-orange-50 rounded-[1.5rem] p-6 border border-orange-100 grid grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <label className="text-sm font-black text-orange-400">門框樣式</label>
                                    <input value={header.frameStyle} onChange={e=>setHeader({...header, frameStyle:e.target.value})} className="w-full bg-transparent border-b-2 border-orange-200 p-2 text-xl font-bold text-orange-900 outline-none" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-black text-orange-400">門片樣式</label>
                                    <input value={header.doorStyle} onChange={e=>setHeader({...header, doorStyle:e.target.value})} className="w-full bg-transparent border-b-2 border-orange-200 p-2 text-xl font-bold text-orange-900 outline-none" />
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-[3rem] p-10 text-center relative overflow-hidden shadow-2xl border-8 border-white">
                                {isLoading && <div className="absolute inset-0 bg-slate-900/90 z-30 flex items-center justify-center"><i data-lucide="loader-2" className="animate-spin text-blue-500 w-16 h-16"></i></div>}
                                <button onClick={toggleRecording} className={`w-36 h-36 rounded-full flex items-center justify-center mx-auto transition-all border-[12px] border-slate-800 shadow-2xl ${isRecording ? 'record-pulse' : 'bg-white'}`}>
                                    {isRecording ? <div className="w-10 h-10 bg-white rounded-lg"></div> : <i data-lucide="mic" className="w-16 h-16 text-slate-900"></i>}
                                </button>
                                {transcript && <p className="mt-6 text-white/50 text-sm font-bold tracking-widest italic">「{transcript}」</p>}
                            </div>

                            <div className="card overflow-hidden">
                                <div className="p-5 bg-slate-50 border-b flex justify-between items-center">
                                    <h3 className="section-title">尺寸明細 ({measurements.length})</h3>
                                    <button onClick={() => setMeasurements([...measurements, { id: Date.now(), no: (measurements.length+1)+".", w:0, h:0, dw:0, dh:0, t:0, style:"房", note:"" }])} className="bg-indigo-600 text-white px-5 py-3 rounded-2xl text-sm font-black shadow-lg">+ 手動新增</button>
                                </div>
                                <div className="overflow-x-auto virtual-list">
                                    <table className="w-full text-left min-w-[1000px] border-separate border-spacing-0">
                                        <thead className="bg-slate-50 text-sm text-slate-400 font-black uppercase sticky top-0 z-20">
                                            <tr><th className="px-6 py-5">編號</th><th className="px-4 py-5">洞寬</th><th className="px-4 py-5">洞高</th><th className="px-4 py-5 text-emerald-600 border-x">門寬</th><th className="px-4 py-5 text-emerald-600 border-r">門高</th><th className="px-4 py-5">牆厚</th><th className="px-6 py-5">備註 / 樣式</th><th className="px-4 py-5 w-20"></th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {measurements.map(m => (
                                                <tr key={m.id} className="hover:bg-blue-50/20">
                                                    <td className="px-6 py-5 font-bold text-slate-400 text-base">{m.no}</td>
                                                    <td className="px-4 py-5"><input type="number" value={m.w} onChange={e=>handleUpdate(m.id, 'w', e.target.value)} className="w-full bg-transparent border-none p-0 text-xl font-black text-blue-800 focus:ring-0" /></td>
                                                    <td className="px-4 py-5"><input type="number" value={m.h} onChange={e=>handleUpdate(m.id, 'h', e.target.value)} className="w-full bg-transparent border-none p-0 text-xl font-black text-blue-800 focus:ring-0" /></td>
                                                    <td className="px-4 py-5 bg-emerald-50/10 font-black text-emerald-600 text-2xl text-center border-x">{m.dw}</td>
                                                    <td className="px-4 py-5 bg-emerald-50/10 font-black text-emerald-600 text-2xl text-center border-r">{m.dh}</td>
                                                    <td className="px-4 py-5"><input type="number" value={m.t} onChange={e=>handleUpdate(m.id, 't', e.target.value)} className="w-full bg-transparent border-none p-0 text-lg font-bold text-center focus:ring-0" /></td>
                                                    <td className="px-6 py-5 flex flex-col gap-2">
                                                        <div className="flex gap-2"><span className="badge">{m.style}</span><span className="badge">隱止</span></div>
                                                        <input value={m.note} onChange={e=>handleUpdate(m.id, 'note', e.target.value)} className="w-full bg-transparent border-none p-0 text-sm text-slate-500 italic" placeholder="備註..." />
                                                    </td>
                                                    <td className="px-4 py-5 text-center"><button onClick={() => setMeasurements(measurements.filter(x=>x.id!==m.id))} className="text-slate-300 hover:text-red-500 p-2 transition-all"><i data-lucide="trash-2" className="w-5 h-5"></i></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div className="card p-8 space-y-8">
                                <h3 className="section-title">五金配件與備註 (四格版)</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="space-y-4">
                                        <div className="space-y-2"><label className="text-sm font-black text-blue-500 uppercase">框門注意事項</label><textarea rows="2" value={header.precautions} onChange={e=>setHeader({...header, precautions:e.target.value})} className="w-full bg-slate-50 border rounded-xl p-4 text-base font-bold resize-none" /></div>
                                        <div className="space-y-2"><label className="text-sm font-black text-blue-500 uppercase">訂單備註</label><textarea rows="2" value={header.orderRemark} onChange={e=>setHeader({...header, orderRemark:e.target.value})} className="w-full bg-slate-50 border rounded-xl p-4 text-base font-bold resize-none" /></div>
                                    </div>
                                    <div className="space-y-2"><label className="text-sm font-black text-red-500 italic">大紅字警示區</label><textarea rows="5" value={header.redNotice} onChange={e=>setHeader({...header, redNotice:e.target.value})} className="w-full bg-red-50/30 border border-red-100 rounded-xl p-4 text-red-600 font-black text-2xl text-center resize-none leading-relaxed" /></div>
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                    {['partCollision','partHinge','partStop','partHandle'].map((key, i) => (
                                        <div key={key} className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                            <label className="text-sm font-black text-slate-400 mb-2 block">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                            <textarea rows="4" value={header[key]} onChange={e=>setHeader({...header, [key]:e.target.value})} className="w-full bg-white border rounded-xl p-3 text-base font-bold outline-none resize-none text-center leading-loose" placeholder="換行對應網格" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    ) : (
                        <main className="p-4 lg:p-8 max-w-5xl mx-auto w-full">
                            <div className="card">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center"><h3 className="font-black italic uppercase text-lg">雲端歷史清單</h3></div>
                                <div className="divide-y divide-slate-100">
                                    {allCases.map(c => (
                                        <div key={c.id} className="p-6 hover:bg-slate-50 transition-all flex justify-between items-center cursor-pointer group" onClick={() => loadCase(c)}>
                                            <div><p className="text-blue-600 font-black text-2xl mb-1">{c.orderNo}</p><p className="text-base font-bold text-slate-500">{c.address}</p></div>
                                            <div className="flex items-center gap-6"><button onClick={(e) => { e.stopPropagation(); setDeleteConfirm(c.orderNo); }} className="p-3 text-slate-400 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" className="w-6 h-6"></i></button><i data-lucide="chevron-right" className="w-8 h-8 text-slate-300 group-hover:text-blue-500 transition-colors"></i></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
