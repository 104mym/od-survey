<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚雲端助理 PRO - 管理端</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .record-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .virtual-list { max-height: 50vh; overflow-y: auto; }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState("main"); // 'main' or 'history'
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [measurements, setMeasurements] = useState([]);
            const [allCases, setAllCases] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [videoUrl, setVideoUrl] = useState(null);
            const [mode, setMode] = useState("Local");
            const fileInputRef = useRef(null);

            const [header, setHeader] = useState({
                orderNo: "20260502-01", address: "桃園市中壢區青商路419號14樓",
                contact: "王廷羽", phone: "0923390718", surveyor: "教父"
            });

            const firebaseConfig = {
                apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                authDomain: "tao-men.firebaseapp.com",
                projectId: "tao-men",
                storageBucket: "tao-men.firebasestorage.app",
                messagingSenderId: "332609297071",
                appId: "1:332609297071:web:03593a930475c97b87525a"
            };

            useEffect(() => {
                const force = setTimeout(() => setIsReady(true), 2000);
                const init = async () => {
                    try {
                        const app = window.FB.initializeApp(firebaseConfig);
                        const firestore = window.FB.getFirestore(app);
                        const auth = window.FB.getAuth(app);
                        setDb(firestore);
                        await window.FB.signInAnonymously(auth);
                        window.FB.onAuthStateChanged(auth, (u) => {
                            if (u) {
                                setMode("Cloud");
                                fetchHistory(firestore);
                                setIsReady(true);
                                clearTimeout(force);
                            }
                        });
                    } catch (e) { setIsReady(true); }
                };
                init();
            }, []);

            const fetchHistory = (fdb) => {
                const colRef = window.FB.collection(fdb, 'artifacts', 'od-app', 'public', 'data', 'cases');
                window.FB.onSnapshot(colRef, (snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllCases(list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)));
                });
            };

            const handleSync = async () => {
                if (mode === "Local") return alert("雲端未連通");
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-app', 'public', 'data', 'cases', header.orderNo);
                    await window.FB.setDoc(docRef, { ...header, items: measurements, updatedAt: new Date().toISOString() });
                    alert("✅ 同步成功！");
                } catch (e) { alert("❌ 同步失敗"); }
                finally { setIsLoading(false); }
            };

            const loadCase = (c) => {
                setHeader({ ...c });
                setMeasurements(c.items || []);
                setView("main");
            };

            const exportExcel = async () => {
                const wb = new window.ExcelJS.Workbook();
                const sh = wb.addWorksheet('下料單');
                sh.columns = [{width:8},{width:10},{width:10},{width:12},{width:12},{width:10},{width:10},{width:10},{width:25},{width:10}];
                sh.mergeCells('A1:H2');
                const t = sh.getCell('A1'); t.value = '下 料 單';
                t.font = { name:'微軟正黑體', size: 20, bold: true, color: { argb: 'FFFFFFFF' } };
                t.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4F81BD' } };
                t.alignment = { vertical: 'middle', horizontal: 'center' };
                const hRow = sh.getRow(8);
                hRow.values = ['編號', '洞寬', '洞高', '門寬(-48)', '門高(-30)', '牆厚', '主體', '線板', '備註', '樣式'];
                hRow.eachCell(c => {
                    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFEFEFEF'} };
                    c.font = { bold: true };
                    c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                });
                measurements.forEach((m, i) => {
                    const r = sh.getRow(9 + i);
                    r.values = [m.no, m.w, m.h, m.dw, m.dh, m.t, m.t, 50, m.note, m.style];
                    r.eachCell(c => { 
                        c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} }; 
                        if(c.column===9) c.font = { color:{argb:'FFFF0000'}, bold:true };
                    });
                });
                const buf = await wb.xlsx.writeBuffer();
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([buf]));
                link.download = `智揚下料單_${header.orderNo}.xlsx`;
                link.click();
            };

            useEffect(() => { if (isReady) setTimeout(() => lucide.createIcons(), 100); }, [measurements, isReady, view, videoUrl]);

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white italic">Zhiyang Pro System Starting...</div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2" onClick={() => setView("main")}>
                            <div className="bg-blue-600 p-1.5 rounded-lg shadow-lg"><i data-lucide="shield-check" className="w-5 h-5"></i></div>
                            <div>
                                <h1 className="text-lg font-black italic uppercase leading-none">智揚助理</h1>
                                <span className="text-[7px] font-bold text-slate-400 uppercase tracking-widest">{mode} Mode</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView(view === 'main' ? 'history' : 'main')} className="bg-slate-800 text-white px-3 py-1.5 rounded-xl text-xs font-black flex items-center gap-1 border border-white/10">
                                <i data-lucide={view === 'main' ? "list" : "chevron-left"} className="w-3 h-3"></i> {view === 'main' ? "歷史紀錄" : "返回丈量"}
                            </button>
                            {view === 'main' && (
                                <button onClick={handleSync} className="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-xs font-black shadow-lg">同步雲端</button>
                            )}
                        </div>
                    </nav>

                    {view === "main" ? (
                        <main className="p-4 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase">訂單編號 / {measurements.length} 樘</label>
                                    <input value={header.orderNo} onChange={e=>setHeader({...header, orderNo: e.target.value})} className="w-full border-b-2 p-1 text-sm font-black text-blue-600 outline-none" />
                                </div>
                                <div className="lg:col-span-2 space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase">案場地址</label>
                                    <input value={header.address} onChange={e=>setHeader({...header, address: e.target.value})} className="w-full border-b-2 p-1 text-sm font-bold outline-none" />
                                </div>
                                <div className="space-y-1 text-center">
                                    <label className="text-[9px] font-black text-slate-400 uppercase text-red-500">影片紀錄區</label>
                                    <button onClick={()=>fileInputRef.current.click()} className="w-full bg-slate-50 py-2 rounded-xl text-[10px] font-black border flex items-center justify-center gap-1">
                                        <i data-lucide="video" className="w-3 h-3 text-red-500"></i> {videoUrl ? "預覽中" : "開啟相簿選取"}
                                    </button>
                                    <input type="file" ref={fileInputRef} hidden accept="video/*" onChange={e=>setVideoUrl(URL.createObjectURL(e.target.files[0]))} />
                                </div>
                            </div>

                            {videoUrl && (
                                <div className="bg-black rounded-[2.5rem] overflow-hidden shadow-2xl aspect-video border-8 border-white relative max-w-2xl mx-auto group">
                                    <video src={videoUrl} controls className="w-full h-full object-cover"></video>
                                    <button onClick={()=>setVideoUrl(null)} className="absolute top-4 right-4 bg-white/20 hover:bg-red-500 text-white p-2 rounded-full"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                </div>
                            )}

                            <div className="bg-slate-900 rounded-[3rem] p-12 text-center relative overflow-hidden shadow-2xl border-8 border-white">
                                {isLoading && <div className="absolute inset-0 bg-slate-900/90 z-30 flex items-center justify-center"><i data-lucide="loader-2" className="animate-spin text-blue-500 w-12 h-12"></i></div>}
                                <div className="text-white/10 font-mono text-7xl mb-10 tracking-tighter">00:00</div>
                                <button className="w-32 h-32 rounded-full flex items-center justify-center mx-auto bg-white border-[12px] border-slate-800 shadow-2xl">
                                    <i data-lucide="mic" className="w-14 h-14 text-slate-900"></i>
                                </button>
                            </div>

                            <div className="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                                <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                                    <button onClick={exportExcel} className="bg-emerald-600 text-white px-4 py-2.5 rounded-2xl text-xs font-black shadow-lg flex items-center gap-1"><i data-lucide="file-spreadsheet" className="w-4 h-4"></i> 美編 EXCEL</button>
                                    <button onClick={() => setMeasurements([...measurements, { id: Date.now(), no: (measurements.length+1)+".", w:0, h:0, dw:0, dh:0, t:0, style:"房", note:"" }])} className="bg-indigo-600 text-white px-4 py-2.5 rounded-2xl text-xs font-black shadow-lg">+ 手動新增</button>
                                </div>
                                <div className="overflow-x-auto virtual-list">
                                    <table className="w-full text-left min-w-[1000px] border-separate border-spacing-0">
                                        <thead className="bg-slate-50 text-[10px] text-slate-400 font-black uppercase sticky top-0 z-20">
                                            <tr><th className="px-6 py-4 w-16 text-center">編號</th><th className="px-4 py-4">洞寬</th><th className="px-4 py-4">洞高</th><th className="px-4 py-4 text-emerald-600 border-x">門寬(-48)</th><th className="px-4 py-4 text-emerald-600 border-r">門高(-30)</th><th className="px-4 py-4 text-center">牆厚</th><th className="px-6 py-4 font-black">備註 / 樣式</th><th className="px-4 py-4 w-16"></th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {measurements.map(m => (
                                                <tr key={m.id} className="hover:bg-blue-50/20 transition-all">
                                                    <td className="px-6 py-4 font-bold text-slate-300 italic text-center">{m.no}</td>
                                                    <td className="px-4 py-4"><input type="number" value={m.w} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, w:e.target.value, dw:e.target.value-48}:x))} className="w-full bg-transparent border-none p-0 text-sm font-black text-blue-800" /></td>
                                                    <td className="px-4 py-4"><input type="number" value={m.h} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, h:e.target.value, dh:e.target.value-30}:x))} className="w-full bg-transparent border-none p-0 text-sm font-black text-blue-800" /></td>
                                                    <td className="px-4 py-4 bg-emerald-50/10 font-black text-emerald-600 text-lg text-center border-x">{m.dw}</td>
                                                    <td className="px-4 py-4 bg-emerald-50/10 font-black text-emerald-600 text-lg text-center border-r">{m.dh}</td>
                                                    <td className="px-4 py-4"><input type="number" value={m.t} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, t:e.target.value}:x))} className="w-full bg-transparent border-none p-0 text-sm font-bold text-center" /></td>
                                                    <td className="px-6 py-4 flex flex-col gap-1">
                                                        <div className="flex gap-2"><span className="badge">{m.style}</span><span className="badge">隱止</span></div>
                                                        <input value={m.note} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, note:e.target.value}:x))} className="w-full bg-transparent border-none p-0 text-[10px] text-slate-400 italic" placeholder="點此輸入備註..." />
                                                    </td>
                                                    <td className="px-4 py-4 text-center">
                                                        <button onClick={() => setMeasurements(measurements.filter(x=>x.id!==m.id))} className="text-slate-200 hover:text-red-500 p-1"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    ) : (
                        <main className="p-4 lg:p-8 max-w-5xl mx-auto w-full">
                            <div className="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                                    <h3 className="font-black italic tracking-widest uppercase">所有雲端案場清單</h3>
                                    <span className="text-[10px] bg-white/10 px-2 py-1 rounded">{allCases.length} 案存檔</span>
                                </div>
                                <div className="divide-y divide-slate-100">
                                    {allCases.map(c => (
                                        <div key={c.id} onClick={() => loadCase(c)} className="p-6 hover:bg-slate-50 transition-all flex justify-between items-center cursor-pointer group">
                                            <div>
                                                <p className="text-blue-600 font-black text-lg">{c.orderNo}</p>
                                                <p className="text-sm font-bold text-slate-500">{c.address}</p>
                                                <p className="text-[10px] text-slate-400 mt-1 uppercase font-bold">同步於: {new Date(c.updatedAt).toLocaleString()}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-2xl font-black text-slate-300 group-hover:text-blue-600 transition-all">{c.items?.length || 0} 樘</p>
                                                <i data-lucide="chevron-right" className="w-5 h-5 text-slate-300 ml-auto"></i>
                                            </div>
                                        </div>
                                    ))}
                                    {allCases.length === 0 && <div className="p-20 text-center text-slate-300 font-bold uppercase italic">No History Found</div>}
                                </div>
                            </div>
                        </main>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
