<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丈量尺寸 - 語音強化版</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; background:#f1f5f9; }
.card { background:white; padding:20px; border-radius:20px; margin-bottom:15px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const App = () => {

    const [header, setHeader] = useState({
        address: "",
        phone: "",
        contact: "",
        orderNo: ""
    });

    const [measurements, setMeasurements] = useState([]);
    const [isRecording, setIsRecording] = useState(false);
    const [transcript, setTranscript] = useState("");

    const recognitionRef = useRef(null);
    const transcriptAccumulator = useRef("");

    // 🎤 初始化語音
    useEffect(() => {
        if ('webkitSpeechRecognition' in window) {
            const SpeechRecognition = window.webkitSpeechRecognition;
            recognitionRef.current = new SpeechRecognition();
            recognitionRef.current.continuous = true;
            recognitionRef.current.interimResults = true;
            recognitionRef.current.lang = 'zh-TW';

            recognitionRef.current.onresult = (e) => {
                let finalStr = "";

                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) {
                        finalStr += e.results[i][0].transcript;
                    }
                }

                if (finalStr) {
                    transcriptAccumulator.current += finalStr + " ";
                    setTranscript(transcriptAccumulator.current);

                    parseSpeech(finalStr); // 🔥 核心
                }
            };

            recognitionRef.current.onerror = () => {
                setIsRecording(false);
            };
        }
    }, []);

    // 🎤 開關錄音
    const toggleRecording = () => {
        if (!recognitionRef.current) return;

        if (isRecording) {
            recognitionRef.current.stop();
        } else {
            transcriptAccumulator.current = "";
            setTranscript("");
            recognitionRef.current.start();
        }

        setIsRecording(!isRecording);
    };

    // 🧠 語音解析核心（強化版）
    const parseSpeech = (text) => {

        let updatedHeader = { ...header };
        let updatedMeasurements = [...measurements];

        let t = text
            .replace(/[，。,.]/g, " ")
            .replace(/\s+/g, " ")
            .trim();

        // 🔧 修正錯字
        const fixMap = [
            [/電話號碼|電話號嗎|電話號馬|電話/g, "電話"],
            [/地址|地只|地止/g, "地址"],
            [/聯絡人|連絡人/g, "聯絡人"],
            [/訂單|單號/g, "訂單"],
            [/寬度|寬/g, "寬"],
            [/高度|高/g, "高"],
        ];

        fixMap.forEach(([r, v]) => t = t.replace(r, v));

        // 🔢 中文數字轉換
        const zhToNum = (str) => {
            const map = {一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,零:0};
            if (/^\d+$/.test(str)) return Number(str);

            if (str.includes("百")) {
                let [h, rest] = str.split("百");
                let num = (map[h] || 1) * 100;
                if (rest?.includes("十")) {
                    let [tens, ones] = rest.split("十");
                    num += (map[tens] || 1) * 10;
                    if (ones) num += map[ones] || 0;
                }
                return num;
            }

            if (str.includes("十")) {
                let [tens, ones] = str.split("十");
                let num = (map[tens] || 1) * 10;
                if (ones) num += map[ones] || 0;
                return num;
            }

            return map[str] || str;
        };

        const getAfter = (key) => {
            const m = t.match(new RegExp(`${key}\\s*(.+)`));
            return m ? m[1].trim() : "";
        };

        // 📌 基本欄位
        if (t.includes("地址")) updatedHeader.address = getAfter("地址");
        if (t.includes("電話")) updatedHeader.phone = getAfter("電話");
        if (t.includes("聯絡人")) updatedHeader.contact = getAfter("聯絡人");
        if (t.includes("訂單")) updatedHeader.orderNo = getAfter("訂單");

        // 📏 尺寸解析
        let width = "", height = "";

        let p1 = t.match(/寬\s*(\S+)\s*高\s*(\S+)/);
        let p2 = t.match(/(\d+)\s*[xX乘]\s*(\d+)/);

        if (p1) {
            width = zhToNum(p1[1]);
            height = zhToNum(p1[2]);
        } else if (p2) {
            width = p2[1];
            height = p2[2];
        }

        if (width || height) {
            updatedMeasurements.push({
                width,
                height
            });
        }

        setHeader(updatedHeader);
        setMeasurements(updatedMeasurements);
    };

    return (
        <div className="p-5">

            <div className="card">
                <button
                    onClick={toggleRecording}
                    className={`px-6 py-3 rounded-full text-white ${isRecording ? "bg-red-500" : "bg-blue-500"}`}
                >
                    {isRecording ? "錄音中..." : "開始語音"}
                </button>

                <div className="mt-4 text-sm text-gray-500">
                    語音內容：{transcript}
                </div>
            </div>

            <div className="card">
                <div>地址：{header.address}</div>
                <div>電話：{header.phone}</div>
                <div>聯絡人：{header.contact}</div>
                <div>訂單：{header.orderNo}</div>
            </div>

            <div className="card">
                <h3 className="font-bold mb-2">尺寸列表</h3>
                {measurements.map((m, i) => (
                    <div key={i}>
                        {m.width} x {m.height}
                    </div>
                ))}
            </div>

        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
