<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚雲端助理 PRO</title>
    
    <!-- 1. 核心套件：基礎庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 2. Excel 引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .record-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .virtual-list { max-height: 55vh; overflow-y: auto; scrollbar-width: none; }
        .virtual-list::-webkit-scrollbar { display: none; }
        input:focus { border-color: #2563eb !important; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
    </style>
</head>
<body>
    <div id="root">
        <!-- 初始安全加載畫面 (1.5秒後會強制消失) -->
        <div class="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <h2 class="text-xl font-black italic tracking-widest uppercase">Zhiyang Pro 安全啟動中</h2>
            <p class="text-slate-500 text-[10px] mt-2 uppercase tracking-[0.2em]">Safety Cloud Linked...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
            authDomain: "tao-men.firebaseapp.com",
            projectId: "tao-men",
            storageBucket: "tao-men.firebasestorage.app",
            messagingSenderId: "332609297071",
            appId: "1:332609297071:web:03593a930475c97b87525a"
        };

        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, firebaseConfig };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [measurements, setMeasurements] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [timer, setTimer] = useState(0);
            const [mode, setMode] = useState("Local");
            const [searchTerm, setSearchTerm] = useState("");

            const [header, setHeader] = useState({
                orderNo: "20260412", address: "桃園市中壢區青商路419號14樓",
                contact: "王廷羽", surveyor: "教父", date: new Date().toISOString().split('T')[0]
            });

            const mediaRecorder = useRef(null);
            const timerRef = useRef(null);

            // 🚀 保險機制：1.5秒內不論雲端成敗，強制顯示主畫面
            useEffect(() => {
                const forceStart = setTimeout(() => setIsReady(true), 1500);

                const setup = async () => {
                    try {
                        if (window.FB) {
                            const app = window.FB.initializeApp(window.FB.firebaseConfig);
                            const firestore = window.FB.getFirestore(app);
                            setDb(firestore);
                            const auth = window.FB.getAuth(app);
                            await window.FB.signInAnonymously(auth);
                            window.FB.onAuthStateChanged(auth, (u) => {
                                if (u) { setMode("Cloud"); if(header.orderNo) loadCloud(firestore, header.orderNo); }
                            });
                        }
                    } catch (e) { console.log("Staying in local mode."); }
                };
                setup();
                return () => clearTimeout(forceStart);
            }, []);

            const loadCloud = async (fdb, oNo) => {
                try {
                    const docRef = window.FB.doc(fdb, 'artifacts', 'od-app', 'public', 'data', 'cases', oNo);
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) {
                        setMeasurements(snap.data().items || []);
                        setHeader(h => ({ ...h, ...snap.data(), orderNo: oNo }));
                    }
                } catch (e) {}
            };

            const handleSync = async () => {
                if (mode === "Local") return alert("雲端尚未連線。");
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-app', 'public', 'data', 'cases', header.orderNo);
                    await window.FB.setDoc(docRef, { ...header, items: measurements, updatedAt: new Date().toISOString() });
                    alert("同步完成！");
                } catch (e) { alert("同步失敗，請檢查 Firebase 計費設定。"); }
                finally { setIsLoading(false); }
            };

            // 修復後的手動新增邏輯
            const addItem = () => {
                const newRow = { id: Date.now(), no: (measurements.length + 1) + ".", w: 0, h: 0, dw: 0, dh: 0, t: 0, style: "房", note: "" };
                setMeasurements([...measurements, newRow]);
            };

            const updateItem = (id, field, val) => {
                setMeasurements(prev => prev.map(m => {
                    if (m.id === id) {
                        let u = { ...m, [field]: val };
                        if (field === 'w') u.dw = val ? parseInt(val) - 48 : 0;
                        if (field === 'h') u.dh = val ? parseInt(val) - 30 : 0;
                        return u;
                    }
                    return m;
                }));
            };

            // 💎 專業美編 Excel 導出功能 (對齊照片樣式)
            const exportExcel = async () => {
                if (!window.ExcelJS) return alert("引擎加載中...");
                const wb = new window.ExcelJS.Workbook();
                const sh = wb.addWorksheet('下料單');
                sh.columns = [{width:8},{width:10},{width:10},{width:12},{width:12},{width:10},{width:10},{width:10},{width:25},{width:10}];
                
                sh.mergeCells('A1:H2');
                const tCell = sh.getCell('A1');
                tCell.value = '下 料 單';
                tCell.font = { name:'微軟正黑體', size: 20, bold: true, color: { argb: 'FFFFFFFF' } };
                tCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4F81BD' } };
                tCell.alignment = { vertical: 'middle', horizontal: 'center' };

                sh.getCell('I1').value = '訂單編號：';
                sh.getCell('J1').value = header.orderNo;
                sh.getCell('I2').value = '丈量人員：';
                sh.getCell('J2').value = header.surveyor;

                const hRow = sh.getRow(8);
                hRow.values = ['編號', '洞寬', '洞高', '門寬(-48)', '門高(-30)', '牆厚', '主體', '線板', '備註', '樣式'];
                hRow.eachCell(c => {
                    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFEFEFEF'} };
                    c.font = { bold: true };
                    c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                    c.alignment = { horizontal: 'center' };
                });

                measurements.forEach((m, i) => {
                    const r = sh.getRow(9 + i);
                    r.values = [m.no, m.w, m.h, m.dw, m.dh, m.t, m.t, 50, m.note, m.style];
                    r.eachCell(c => {
                        c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                        c.alignment = { horizontal: 'center' };
                        if (c.column === 9) c.font = { color: { argb: 'FFFF0000' }, bold: true };
                    });
                });

                const buffer = await wb.xlsx.writeBuffer();
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([buffer]));
                link.download = `智揚下料單_${header.orderNo}.xlsx`;
                link.click();
            };

            const toggleRecording = async () => {
                if (isRecording) {
                    mediaRecorder.current.stop();
                    mediaRecorder.current.stream.getTracks().forEach(t => t.stop());
                    setIsRecording(false);
                    clearInterval(timerRef.current);
                } else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder.current = new MediaRecorder(s);
                        mediaRecorder.current.start();
                        setIsRecording(true);
                        setTimer(0);
                        timerRef.current = setInterval(() => setTimer(p => p + 1), 1000);
                    } catch (err) { alert("請點擊網址旁邊的鎖頭授權麥克風。"); }
                }
            };

            useEffect(() => { if (isReady) setTimeout(() => lucide.createIcons(), 100); }, [measurements, isRecording, isReady]);

            if (!isReady) return null;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg shadow-lg"><i data-lucide="shield-check" className="w-5 h-5 text-white"></i></div>
                            <div>
                                <h1 className="text-lg font-black italic tracking-tighter uppercase leading-none">智揚助理</h1>
                                <div className="flex items-center gap-1 mt-1">
                                    <div className={`w-1.5 h-1.5 rounded-full ${mode === 'Cloud' ? 'bg-emerald-500' : 'bg-slate-500'}`}></div>
                                    <span className="text-[7px] font-bold text-slate-400 uppercase tracking-widest">{mode} Mode</span>
                                </div>
                            </div>
                        </div>
                        <button onClick={handleSync} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-xs font-black shadow-lg">同步雲端</button>
                    </nav>

                    <main className="p-4 lg:p-8 max-w-7xl mx-auto w-full space-y-6">
                        <div className="bg-white rounded-[2rem] p-6 shadow-sm border grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="space-y-1">
                                <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">訂單編號 / {measurements.length} 樘</label>
                                <input value={header.orderNo} onBlur={() => loadCloud(db, header.orderNo)} onChange={e=>setHeader({...header, orderNo: e.target.value})} className="w-full border-b-2 p-1 text-sm font-black text-blue-600 outline-none" />
                            </div>
                            <div className="lg:col-span-2 space-y-1">
                                <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">案場地址</label>
                                <input value={header.address} onChange={e=>setHeader({...header, address: e.target.value})} className="w-full border-b-2 p-1 text-sm font-bold outline-none" />
                            </div>
                            <div className="flex items-center justify-center">
                                <button onClick={exportExcel} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-md flex items-center gap-1"><i data-lucide="file-spreadsheet" className="w-4 h-4"></i> 專業美編 EXCEL 導出</button>
                            </div>
                        </div>

                        <div className="bg-slate-900 rounded-[3rem] p-12 text-center relative overflow-hidden shadow-2xl border-8 border-white">
                            {isLoading && <div className="absolute inset-0 bg-slate-900/90 z-30 flex items-center justify-center"><i data-lucide="loader-2" className="animate-spin text-blue-500 w-12 h-12"></i></div>}
                            <div className="text-white/10 font-mono text-7xl mb-10 tracking-tighter">
                                {Math.floor(timer/60).toString().padStart(2,'0')}:{(timer%60).toString().padStart(2,'0')}
                            </div>
                            <button onClick={toggleRecording} className={`w-32 h-32 rounded-full flex items-center justify-center mx-auto transition-all border-[12px] border-slate-800 ${isRecording ? 'record-pulse' : 'bg-white hover:scale-105'}`}>
                                {isRecording ? <div className="w-10 h-10 bg-white rounded-lg"></div> : <i data-lucide="mic" className="w-14 h-14 text-slate-900"></i>}
                            </button>
                            {/* 藍色輔助字體已徹底移除 */}
                        </div>

                        <div className="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                            <div className="p-6 bg-slate-50 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                                <input placeholder="搜尋..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full md:w-64 pl-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold outline-none" />
                                <button onClick={addItem} className="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl text-xs font-black shadow-lg hover:bg-indigo-700 transition">+ 手動新增項目</button>
                            </div>
                            <div className="overflow-x-auto virtual-list">
                                <table className="w-full text-left min-w-[1000px] border-separate border-spacing-0">
                                    <thead className="bg-slate-50 text-[10px] text-slate-400 font-black uppercase sticky top-0 z-20">
                                        <tr>
                                            <th className="px-6 py-4 w-16 text-center">編號</th>
                                            <th className="px-4 py-4 font-black">洞寬</th>
                                            <th className="px-4 py-4 font-black">洞高</th>
                                            <th className="px-4 py-4 text-emerald-600 border-x">門寬(-48)</th>
                                            <th className="px-4 py-4 text-emerald-600 border-r">門高(-30)</th>
                                            <th className="px-4 py-4 font-black text-center">牆厚</th>
                                            <th className="px-6 py-4 font-black">備註 / 樣式</th>
                                            <th className="px-4 py-4 w-16"></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {measurements.filter(m=>m.no.includes(searchTerm)||m.note.includes(searchTerm)).map(m => (
                                            <tr key={m.id} className="hover:bg-blue-50/20 transition-all">
                                                <td className="px-6 py-4 font-bold text-slate-300 italic text-center">{m.no}</td>
                                                <td className="px-4 py-4"><input type="number" value={m.w} onChange={e=>updateItem(m.id, 'w', e.target.value)} className="w-full bg-transparent border-none p-0 text-sm font-black text-blue-800 focus:ring-0" /></td>
                                                <td className="px-4 py-4"><input type="number" value={m.h} onChange={e=>updateItem(m.id, 'h', e.target.value)} className="w-full bg-transparent border-none p-0 text-sm font-black text-blue-800 focus:ring-0" /></td>
                                                <td className="px-4 py-4 bg-emerald-50/10 font-black text-emerald-600 text-lg text-center border-x">{m.dw}</td>
                                                <td className="px-4 py-4 bg-emerald-50/10 font-black text-emerald-600 text-lg text-center border-r">{m.dh}</td>
                                                <td className="px-4 py-4"><input type="number" value={m.t} onChange={e=>updateItem(m.id, 't', e.target.value)} className="w-full bg-transparent border-none p-0 text-sm font-bold text-center text-slate-700" /></td>
                                                <td className="px-6 py-4 flex flex-col gap-1">
                                                    <div className="flex gap-2"><span className="badge">{m.style}</span><span className="badge">隱</span></div>
                                                    <input value={m.note} onChange={e=>updateItem(m.id, 'note', e.target.value)} className="w-full bg-transparent border-none p-0 text-[10px] text-slate-400 italic" placeholder="輸入備註..." />
                                                </td>
                                                <td className="px-4 py-4 text-center">
                                                    <button onClick={() => setMeasurements(measurements.filter(x=>x.id!==m.id))} className="text-slate-200 hover:text-red-500 transition-all p-1"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                    <footer className="text-center py-10 opacity-30 text-[10px] font-black uppercase tracking-[0.5em] mt-auto">ZHIYANG PRO v25.0 - Safety Stable Engine</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
