<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 強制瀏覽器不使用快取 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>丈量尺寸 - 歷史編輯優化版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; color: #1e293b; }
        .record-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; overflow: hidden; }
        .section-title { border-left: 6px solid #2563eb; padding-left: 12px; font-weight: 900; color: #1e293b; letter-spacing: 1px; font-size: 1.25rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, getStorage, ref, uploadBytes, getDownloadURL };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const temp = document.createElement('div');
                    temp.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: temp });
                    const svg = temp.querySelector('svg');
                    if (svg) {
                        if (className) className.split(' ').forEach(c => { if (c.trim()) svg.classList.add(c.trim()); });
                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const version = "v1.8.0 (編輯功能增強版)";
        const builtInApiKey = "AIzaSyCBBjJwbHHvuTDvgJbyUZzHOYyE5Owa5bg"; 

        const App = () => {
            const [view, setView] = useState("main"); 
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [storage, setStorage] = useState(null);
            const [user, setUser] = useState(null);
            const [measurements, setMeasurements] = useState([]);
            const [allCases, setAllCases] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [logoImgBase64, setLogoImgBase64] = useState("");
            const [alertMsg, setAlertMsg] = useState(null); 
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [localApiKey, setLocalApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [selectedVideoFile, setSelectedVideoFile] = useState(null);
            const [previewVideoUrl, setPreviewVideoUrl] = useState("");

            const recognitionRef = useRef(null);
            const fileInputRef = useRef(null);
            const logoInputRef = useRef(null);
            const transcriptAccumulator = useRef(""); 
            const canvasAppId = 'od-survey-system';

            const [header, setHeader] = useState({
                orderNo: "", address: "", contact: "", phone: "", surveyor: "", company: "",
                frameStyle: "", doorStyle: "", precautions: "", orderRemark: "", redNotice: "",
                partCollision: "", partHinge: "", partStop: "", partHandle: "",
                deposit: "0", videoLink: "" 
            });

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
                    const ctx = canvas.getContext('2d'); ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 300, 300);
                    ctx.beginPath(); ctx.arc(150, 130, 100, 0, 2 * Math.PI); ctx.lineWidth = 15; ctx.strokeStyle = '#000'; ctx.stroke();
                    ctx.font = '900 120px "Noto Serif TC", serif'; ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 150, 140);
                    ctx.font = '900 32px "Noto Sans TC", sans-serif'; ctx.fillText('門 扉 美 學 館', 150, 260);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const firebaseConfig = {
                            apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                            authDomain: "tao-men.firebaseapp.com",
                            projectId: "tao-men",
                            storageBucket: "tao-men.firebasestorage.app",
                            messagingSenderId: "332609297071",
                            appId: "1:332609297071:web:03593a930475c97b87525a"
                        };
                        const app = window.FB.initializeApp(firebaseConfig);
                        setDb(window.FB.getFirestore(app));
                        setStorage(window.FB.getStorage(app));
                        const auth = window.FB.getAuth(app);
                        await window.FB.signInAnonymously(auth);
                        window.FB.onAuthStateChanged(auth, (u) => setUser(u));
                        setIsReady(true);
                    } catch (e) { setIsReady(true); }
                };
                initFirebase();
                const savedLogo = localStorage.getItem('customLogo');
                if (savedLogo) setLogoImgBase64(savedLogo);
                else getLogoBase64().then(url => setLogoImgBase64(url));

                if ('webkitSpeechRecognition' in window) {
                    const SpeechRecognition = window.webkitSpeechRecognition;
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true; recognitionRef.current.interimResults = true; recognitionRef.current.lang = 'zh-TW';
                    recognitionRef.current.onresult = (e) => {
                        let finalStr = "";
                        for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) finalStr += e.results[i][0].transcript; }
                        if (finalStr) transcriptAccumulator.current += finalStr + " ";
                        setTranscript(transcriptAccumulator.current);
                    };
                    recognitionRef.current.onerror = () => setIsRecording(false);
                }
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const colRef = window.FB.collection(db, 'artifacts', canvasAppId, 'public', 'data', 'cases');
                const unsubscribe = window.FB.onSnapshot(colRef, (snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllCases(list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)));
                });
                return () => unsubscribe();
            }, [user, db]);

            const exportExcel = async () => {
                setIsLoading(true);
                try {
                    const wb = new window.ExcelJS.Workbook();
                    const sh = wb.addWorksheet('下料單');
                    sh.columns = [ { width: 6 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 22 }, { width: 6 }, { width: 6 }, { width: 6 } ];
                    const b = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    sh.mergeCells('A1:B3');
                    if (logoImgBase64) {
                        const img = wb.addImage({ base64: logoImgBase64.split(',')[1], extension: 'png' });
                        sh.addImage(img, { tl: { col: 0, row: 0 }, br: { col: 2, row: 3 }, editAs: 'oneCell' });
                    }
                    sh.mergeCells('C1:H3');
                    const tit = sh.getCell('C1'); tit.value = '下 料 單'; tit.font = { size: 24, bold: true }; tit.alignment = { vertical:'middle', horizontal:'center' };
                    sh.getCell('I1').value = '訂單編號:'; sh.mergeCells('J1:L1'); sh.getCell('J1').value = header.orderNo;
                    sh.getCell('I2').value = '丈量人員:'; sh.mergeCells('J2:L2'); sh.getCell('J2').value = header.surveyor;
                    sh.getCell('I3').value = '丈量日期:'; sh.mergeCells('J3:L3'); sh.getCell('J3').value = new Date().toISOString().slice(0,10);
                    sh.mergeCells('A4:B4'); sh.getCell('A4').value = '公   司:'; sh.mergeCells('C4:L4'); sh.getCell('C4').value = header.company;
                    sh.mergeCells('A5:B5'); sh.getCell('A5').value = '聯 絡 人:'; sh.mergeCells('C5:E5'); sh.getCell('C5').value = header.contact; 
                    sh.mergeCells('F5:G5'); sh.getCell('F5').value = '電   話:'; sh.mergeCells('H5:L5'); sh.getCell('H5').value = header.phone;
                    sh.mergeCells('A6:B6'); sh.getCell('A6').value = '案場地址:'; sh.mergeCells('C6:L6'); sh.getCell('C6').value = header.address; 
                    for(let r=1; r<=6; r++) { sh.getRow(r).height = 25; for(let c=1; c<=12; c++) { const cell = sh.getCell(r, c); cell.border = b; cell.alignment = { vertical:'middle', horizontal:'left' }; cell.font = { bold:true, size:12 }; } }
                    const buf = await wb.xlsx.writeBuffer(); const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([buf])); link.download = `丈量單_${header.orderNo}.xlsx`; link.click();
                } catch(e) { setAlertMsg({ title: "導出失敗", body: e.message, isError: true }); } finally { setIsLoading(false); }
            };

            const syncToCloud = async () => {
                if (!db || !user || !header.orderNo) return;
                setIsLoading(true);
                try {
                    let videoUrl = header.videoLink;
                    if (selectedVideoFile) {
                        setAlertMsg({ title: "同步中...", body: "正在上傳影片至雲端...", isError: false });
                        const videoRef = window.FB.ref(storage, `artifacts/${canvasAppId}/videos/${header.orderNo}.mp4`);
                        const snapshot = await window.FB.uploadBytes(videoRef, selectedVideoFile);
                        videoUrl = await window.FB.getDownloadURL(snapshot.ref);
                        setSelectedVideoFile(null);
                    }
                    const docRef = window.FB.doc(db, 'artifacts', canvasAppId, 'public', 'data', 'cases', header.orderNo);
                    await window.FB.setDoc(docRef, { ...header, videoLink: videoUrl, items: measurements, updatedAt: new Date().toISOString() });
                    setAlertMsg({ title: "同步成功", body: `編號 [${header.orderNo}] 已儲存。`, isError: false });
                } catch (e) { setAlertMsg({ title: "同步失敗", body: e.message, isError: true }); } finally { setIsLoading(false); }
            };

            const toggleRecording = () => {
                if (isRecording) { recognitionRef.current.stop(); setIsRecording(false); }
                else { transcriptAccumulator.current = ""; setTranscript(""); recognitionRef.current.start(); setIsRecording(true); }
            };

            const loadCase = (c) => { 
                setHeader({ ...c }); 
                setMeasurements(c.items || []); 
                setPreviewVideoUrl(c.videoLink || "");
                setView('main'); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white italic font-black text-3xl animate-pulse">系統加載中...</div>;

            return (
                <div className="min-h-screen flex flex-col pb-20 relative text-slate-800">
                    <nav className="bg-slate-900 text-white p-4 md:p-5 shadow-xl sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-white p-1 rounded-xl shadow-lg group cursor-pointer relative overflow-hidden" onClick={() => logoInputRef.current.click()}>
                                {logoImgBase64 && <img src={logoImgBase64} className="w-8 h-8 md:w-10 md:h-10 object-contain" alt="Logo" />}
                                <input type="file" ref={logoInputRef} hidden accept="image/*" onChange={(e) => {
                                    const file = e.target.files[0]; if (file) {
                                        const reader = new FileReader();
                                        reader.onload = (ev) => { setLogoImgBase64(ev.target.result); localStorage.setItem('customLogo', ev.target.result); };
                                        reader.readAsDataURL(file);
                                    }
                                }} />
                            </div>
                            <div className="cursor-pointer" onClick={() => setView("main")}>
                                <h1 className="text-lg md:text-2xl font-black italic uppercase leading-none tracking-tighter">丈量尺寸</h1>
                                <div className="flex items-center gap-2 mt-1"><span className="text-[9px] md:text-[10px] font-bold text-emerald-400 uppercase">{version}</span></div>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(true)} className="bg-slate-800 px-3 py-2 rounded-xl text-xs font-black"><Icon name="settings" className="w-4 h-4" /></button>
                            <button onClick={() => setView(view === 'main' ? 'history' : 'main')} className="bg-slate-800 px-3 py-2 rounded-xl text-xs font-black flex items-center gap-1">
                                <Icon name={view === 'main' ? "list" : "chevron-left"} className="w-4 h-4" /> 
                                <span>{view === 'main' ? "紀錄" : "返回"}</span>
                            </button>
                            <button onClick={syncToCloud} className="bg-blue-600 px-3 py-2 rounded-xl text-xs font-black shadow-lg">同步</button>
                        </div>
                    </nav>

                    {view === "main" ? (
                        <main className="p-3 md:p-8 max-w-7xl mx-auto w-full space-y-6 animate-in fade-in duration-500">
                            <div className="card p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                                <div className="space-y-1"><label className="text-xs font-black text-slate-400">編號</label><input value={header.orderNo} onChange={e=>setHeader({...header, orderNo: e.target.value})} className="w-full border-b-2 p-1 text-lg font-black text-blue-600 outline-none" /></div>
                                <div className="lg:col-span-2 space-y-1"><label className="text-xs font-black text-slate-400">地址</label><input value={header.address} onChange={e=>setHeader({...header, address: e.target.value})} className="w-full border-b-2 p-1 text-lg font-bold outline-none" /></div>
                                <div className="space-y-1"><button onClick={()=>fileInputRef.current.click()} className="w-full bg-slate-50 py-3 rounded-xl text-xs font-black border flex items-center justify-center gap-2 mt-4"><Icon name="video" className="w-4 h-4" /> {previewVideoUrl ? "更換影片" : "選取影片"}</button><input type="file" ref={fileInputRef} hidden accept="video/*" onChange={e=>{if(e.target.files[0]){setSelectedVideoFile(e.target.files[0]); setPreviewVideoUrl(URL.createObjectURL(e.target.files[0]))}}} /></div>
                                <button onClick={exportExcel} className="bg-emerald-600 text-white py-3 rounded-xl text-sm font-black shadow-lg mt-auto flex items-center justify-center gap-2 hover:bg-emerald-500 transition-all"><Icon name="file-spreadsheet" className="w-5 h-5" /> 匯出 EXCEL</button>
                            </div>
                            {previewVideoUrl && <div className="card overflow-hidden bg-black aspect-video max-w-xl mx-auto border-4 border-white"><video src={previewVideoUrl} controls className="w-full h-full object-contain"></video></div>}
                            <div className="bg-slate-900 rounded-3xl p-6 md:p-10 text-center relative overflow-hidden shadow-2xl">
                                {isLoading && <div className="absolute inset-0 bg-slate-900/95 z-30 flex flex-col items-center justify-center"><Icon name="loader-2" className="animate-spin text-blue-500 w-16 h-16" /></div>}
                                <button onClick={toggleRecording} className={`w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center mx-auto ${isRecording ? 'record-pulse' : 'bg-white'}`}>{isRecording ? <div className="w-8 h-8 bg-white"></div> : <Icon name="mic" className="w-10 h-10 text-slate-900" />}</button>
                                {transcript !== "" && (
                                    <div className="mt-6 space-y-4 text-left">
                                        <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} className="w-full bg-slate-800 text-white p-4 rounded-xl text-sm italic min-h-[80px]" />
                                        {!isRecording && <button onClick={() => parseSpeech(transcript)} className="mx-auto bg-blue-600 text-white px-8 py-3 rounded-xl font-black">AI 解析</button>}
                                    </div>
                                )}
                            </div>
                            <div className="card overflow-hidden">
                                <div className="p-4 bg-slate-50 border-b flex justify-between items-center"><h3 className="section-title italic uppercase">數據列表</h3><button onClick={() => setMeasurements([...measurements, { id: Date.now(), no: (measurements.length+1)+".", w:0, h:0, dw:0, dh:0, t:0, note:"" }])} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-black">+ 新增</button></div>
                                <div className="overflow-x-auto no-scrollbar"><table className="w-full min-w-[800px] text-center border-separate border-spacing-0"><thead className="bg-slate-50 text-[10px] text-slate-400 font-black uppercase border-b"><tr><th className="p-4">序號</th><th className="p-2 text-blue-700">洞寬</th><th className="p-2 text-blue-700">洞高</th><th className="p-2 text-emerald-600">門寬</th><th className="p-2 text-emerald-600">門高</th><th className="p-2">牆厚</th><th className="p-4 text-left">備註</th><th></th></tr></thead>
                                <tbody className="divide-y divide-slate-100">{measurements.map(m => (<tr key={m.id} className="hover:bg-blue-50/20 group transition-colors"><td className="p-4 font-bold text-slate-400 italic">{m.no}</td><td className="p-2"><input type="number" value={m.w || ""} onChange={e=>{ const val=parseInt(e.target.value)||0; setMeasurements(measurements.map(x=>x.id===m.id?{...x, w:val, dw:val-48}:x)); }} className="w-full text-center text-lg font-black text-blue-800 outline-none bg-transparent" /></td><td className="p-2"><input type="number" value={m.h || ""} onChange={e=>{ const val=parseInt(e.target.value)||0; setMeasurements(measurements.map(x=>x.id===m.id?{...x, h:val, dh:val-30}:x)); }} className="w-full text-center text-lg font-black text-blue-800 outline-none bg-transparent" /></td><td className="p-2 font-black text-emerald-600 text-xl">{m.dw}</td><td className="p-2 font-black text-emerald-600 text-xl">{m.dh}</td><td className="p-2"><input type="number" value={m.t || ""} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, t:parseInt(e.target.value)||0}:x))} className="w-full text-center text-lg font-bold outline-none bg-transparent" /></td><td className="p-4 text-left"><input value={m.note} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, note:e.target.value}:x))} className="w-full text-sm font-bold italic outline-none bg-transparent" /></td><td><button onClick={()=>setMeasurements(measurements.filter(x=>x.id!==m.id))} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" className="w-5 h-5" /></button></td></tr>))}</tbody></table></div>
                            </div>

                            <div className="card p-5 md:p-10 space-y-6">
                                <h3 className="section-title italic tracking-widest uppercase">詳細備註與配件</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-4">
                                        <div className="space-y-1.5"><label className="text-xs font-black text-blue-500 uppercase">注意事項</label><textarea rows="2" value={header.precautions} onChange={e=>setHeader({...header, precautions:e.target.value})} className="w-full bg-slate-50 border rounded-xl p-3 text-base font-bold resize-none" /></div>
                                        <div className="space-y-1.5"><label className="text-xs font-black text-blue-500 uppercase">訂單備註</label><textarea rows="2" value={header.orderRemark} onChange={e=>setHeader({...header, orderRemark:e.target.value})} className="w-full bg-slate-50 border rounded-xl p-3 text-base font-bold resize-none" /></div>
                                    </div>
                                    <div className="space-y-1.5"><label className="text-xs font-black text-red-500 italic font-black">大紅字警示區</label><textarea rows="4" value={header.redNotice} onChange={e=>setHeader({...header, redNotice:e.target.value})} className="w-full bg-red-50/30 border border-red-100 rounded-2xl p-4 text-red-600 font-black text-2xl text-center resize-none leading-relaxed shadow-inner" placeholder="例如：門下大陸" /></div>
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                    {['partCollision','partHinge','partStop','partHandle'].map((k, i) => (
                                        <div key={k} className="bg-slate-50 p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                                            <label className="text-xs font-black text-slate-400 mb-2 block uppercase tracking-widest">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                            <textarea rows="3" value={header[k]} onChange={e=>setHeader({...header, [k]:e.target.value})} className="w-full bg-white border rounded-xl p-2 text-base font-black outline-none resize-none text-center shadow-inner" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    ) : (
                        <main className="p-4 max-w-5xl mx-auto w-full animate-in slide-in-from-bottom duration-300">
                            <div className="card shadow-2xl">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center rounded-t-2xl">
                                    <h3 className="font-black italic text-lg uppercase tracking-widest">雲端存檔清單</h3>
                                    <span className="bg-blue-600 px-3 py-1 rounded-full text-[10px] font-black italic">{allCases.length} 筆存檔</span>
                                </div>
                                <div className="divide-y divide-slate-100 max-h-[70vh] overflow-y-auto no-scrollbar">
                                    {allCases.map(c => (
                                        <div key={c.id} className="p-5 hover:bg-blue-50/50 transition-all flex justify-between items-center group">
                                            <div className="space-y-1">
                                                <p className="text-blue-600 font-black text-xl mb-1 tracking-tighter">[{c.orderNo || "無編號"}]</p>
                                                <p className="text-sm font-bold text-slate-500 truncate max-w-[150px] md:max-w-md">{c.address || "無地址"}</p>
                                                <p className="text-[10px] text-slate-300 font-bold italic">更新於: {new Date(c.updatedAt).toLocaleString()}</p>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => loadCase(c)} className="bg-emerald-50 text-emerald-600 px-3 py-2 rounded-xl text-xs font-black flex items-center gap-1 hover:bg-emerald-100 transition-colors shadow-sm">
                                                    <Icon name="edit-3" className="w-4 h-4" /> <span>編輯</span>
                                                </button>
                                                <button onClick={(e) => { e.stopPropagation(); setConfirmDialog({ title: "刪除紀錄", body: `確定刪除 [${c.orderNo}] 嗎？`, onConfirm: async () => { try { await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', canvasAppId, 'public', 'data', 'cases', c.orderNo)); setConfirmDialog(null); } catch(e){} } }); }} className="bg-red-50 text-red-400 p-2 rounded-xl hover:bg-red-100 hover:text-red-600 transition-all">
                                                    <Icon name="trash-2" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                    {allCases.length === 0 && <div className="p-16 text-center text-slate-400 font-black italic uppercase tracking-widest">尚無雲端紀錄</div>}
                                </div>
                            </div>
                        </main>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full shadow-2xl animate-in zoom-in duration-200">
                                <h3 className="text-xl font-black mb-4 tracking-widest">系統設定</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-black text-slate-500 mb-2 block uppercase tracking-widest">Gemini API Key</label>
                                        <input type="password" value={localApiKey} onChange={e=>setLocalApiKey(e.target.value)} placeholder="AIzaSy..." className="w-full border-2 rounded-xl p-3 font-bold text-sm outline-none focus:border-blue-500" />
                                    </div>
                                    <button onClick={()=>{localStorage.setItem('gemini_api_key', localApiKey.trim()); setShowSettings(false);}} className="w-full bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg hover:bg-blue-500 active:scale-95 transition-all">儲存設定</button>
                                    <button onClick={()=>setShowSettings(false)} className="w-full bg-slate-100 text-slate-500 py-3 rounded-xl font-black mt-2 active:scale-95 transition-all">關閉</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {alertMsg && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl animate-in zoom-in duration-200">
                                <div className={`w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center ${alertMsg.isError ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-500'}`}>
                                    <Icon name={alertMsg.isError ? "x-circle" : "check-circle-2"} className="w-8 h-8" />
                                </div>
                                <h3 className="text-xl font-black mb-2">{alertMsg.title}</h3>
                                <p className="text-slate-500 text-sm font-bold whitespace-pre-wrap leading-relaxed">{alertMsg.body}</p>
                                {!isLoading && <button onClick={()=>setAlertMsg(null)} className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-black active:scale-95 transition-all">確定</button>}
                            </div>
                        </div>
                    )}

                    {confirmDialog && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl animate-in zoom-in duration-200">
                                <div className="w-16 h-16 rounded-full bg-red-50 text-red-500 mx-auto mb-4 flex items-center justify-center"><Icon name="alert-triangle" className="w-8 h-8" /></div>
                                <h3 className="text-xl font-black mb-2">{confirmDialog.title}</h3>
                                <p className="text-slate-500 text-sm font-bold">{confirmDialog.body}</p>
                                <div className="mt-6 flex gap-3">
                                    <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-black active:scale-95 transition-all">取消</button>
                                    <button onClick={confirmDialog.onConfirm} className="flex-1 bg-red-500 text-white py-3 rounded-xl font-black shadow-lg active:scale-95 transition-all">確認刪除</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
