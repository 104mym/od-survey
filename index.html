<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>丈量尺寸 - 極速版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; color: #1e293b; }
        .record-pulse { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; overflow: hidden; }
        .section-title { border-left: 6px solid #2563eb; padding-left: 12px; font-weight: 900; color: #1e293b; letter-spacing: 1px; font-size: 1.25rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const temp = document.createElement('div');
                    temp.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: temp });
                    const svg = temp.querySelector('svg');
                    if (svg) {
                        if (className) className.split(' ').forEach(c => { if (c.trim()) svg.classList.add(c.trim()); });
                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const version = "v4.0.1 (完美對齊四格版)";
        const builtInApiKey = "AIzaSyCBBjJwbHHvuTDvgJbyUZzHOYyE5Owa5bg"; 

        const App = () => {
            const [view, setView] = useState("main"); 
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [measurements, setMeasurements] = useState([]);
            const [allCases, setAllCases] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [logoImgBase64, setLogoImgBase64] = useState("");
            const [alertMsg, setAlertMsg] = useState(null); 
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [localApiKey, setLocalApiKey] = useState(localStorage.getItem('gemini_api_key') || "");

            const recognitionRef = useRef(null);
            const logoInputRef = useRef(null);
            const transcriptAccumulator = useRef(""); 
            const canvasAppId = 'od-survey-system';

            const [header, setHeader] = useState({
                orderNo: "", address: "", contact: "", phone: "", surveyor: "", company: "",
                frameStyle: "", doorStyle: "", precautions: "", orderRemark: "", redNotice: "",
                partCollision: "", partHinge: "", partStop: "", partHandle: "",
                deposit: "0", videoLink: "", externalVideoLink: "" 
            });

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
                    const ctx = canvas.getContext('2d'); ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 300, 300);
                    ctx.beginPath(); ctx.arc(150, 130, 100, 0, 2 * Math.PI); ctx.lineWidth = 15; ctx.strokeStyle = '#000'; ctx.stroke();
                    ctx.font = '900 120px "Noto Serif TC", serif'; ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 150, 140);
                    ctx.font = '900 32px "Noto Sans TC", sans-serif'; ctx.fillText('門 扉 美 學 館', 150, 260);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const firebaseConfig = {
                            apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                            authDomain: "tao-men.firebaseapp.com",
                            projectId: "tao-men",
                            storageBucket: "tao-men.firebasestorage.app",
                            messagingSenderId: "332609297071",
                            appId: "1:332609297071:web:03593a930475c97b87525a"
                        };
                        const app = window.FB.initializeApp(firebaseConfig);
                        setDb(window.FB.getFirestore(app));
                        const auth = window.FB.getAuth(app);
                        await window.FB.signInAnonymously(auth);
                        window.FB.onAuthStateChanged(auth, (u) => setUser(u));
                        setIsReady(true);
                    } catch (e) { setIsReady(true); }
                };
                initFirebase();
                const savedLogo = localStorage.getItem('customLogo');
                if (savedLogo) setLogoImgBase64(savedLogo);
                else getLogoBase64().then(url => setLogoImgBase64(url));

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true; 
                    recognitionRef.current.interimResults = true; 
                    recognitionRef.current.lang = 'zh-TW';
                    recognitionRef.current.onresult = (e) => {
                        let finalStr = "";
                        for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) finalStr += e.results[i][0].transcript; }
                        if (finalStr) transcriptAccumulator.current += finalStr + " ";
                        setTranscript(transcriptAccumulator.current);
                    };
                    recognitionRef.current.onerror = () => setIsRecording(false);
                    recognitionRef.current.onend = () => setIsRecording(false);
                }
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const colRef = window.FB.collection(db, 'artifacts', canvasAppId, 'public', 'data', 'cases');
                const unsubscribe = window.FB.onSnapshot(colRef, (snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllCases(list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)));
                });
                return () => unsubscribe();
            }, [user, db]);

            const exportExcel = async () => {
                setIsLoading(true);
                try {
                    const wb = new window.ExcelJS.Workbook();
                    const sh = wb.addWorksheet('下料單');
                    sh.columns = [ { width: 6 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 22 }, { width: 6 }, { width: 6 }, { width: 6 } ];
                    const b = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    sh.mergeCells('A1:B3');
                    if (logoImgBase64) {
                        const img = wb.addImage({ base64: logoImgBase64.split(',')[1], extension: 'png' });
                        sh.addImage(img, { tl: { col: 0, row: 0 }, br: { col: 2, row: 3 }, editAs: 'oneCell' });
                    }
                    sh.mergeCells('C1:H3');
                    const tit = sh.getCell('C1'); tit.value = '下 料 單'; tit.font = { size: 24, bold: true }; tit.alignment = { vertical:'middle', horizontal:'center' };
                    sh.getCell('I1').value = '訂單編號:'; sh.mergeCells('J1:L1'); sh.getCell('J1').value = header.orderNo;
                    sh.getCell('I2').value = '丈量人員:'; sh.mergeCells('J2:L2'); sh.getCell('J2').value = header.surveyor;
                    sh.getCell('I3').value = '丈量日期:'; sh.mergeCells('J3:L3'); sh.getCell('J3').value = new Date().toISOString().slice(0,10);
                    sh.mergeCells('A4:B4'); sh.getCell('A4').value = '公   司:'; sh.mergeCells('C4:L4'); sh.getCell('C4').value = header.company;
                    sh.mergeCells('A5:B5'); sh.getCell('A5').value = '聯 絡 人:'; sh.mergeCells('C5:E5'); sh.getCell('C5').value = header.contact; 
                    sh.mergeCells('F5:G5'); sh.getCell('F5').value = '電   話:'; sh.mergeCells('H5:L5'); sh.getCell('H5').value = header.phone;
                    sh.mergeCells('A6:B6'); sh.getCell('A6').value = '案場地址:'; sh.mergeCells('C6:L6'); sh.getCell('C6').value = header.address; 
                    for(let r=1; r<=6; r++) { sh.getRow(r).height = 25; for(let c=1; c<=12; c++) { const cell = sh.getCell(r, c); cell.border = b; cell.alignment = { vertical:'middle', horizontal:'left' }; cell.font = { bold:true, size:12 }; } }
                    sh.getRow(7).height = 25; sh.getRow(8).height = 25;
                    sh.mergeCells('A7:B8'); sh.getCell('A7').value = "門框\n樣式:"; sh.mergeCells('C7:E8'); sh.getCell('C7').value = header.frameStyle;
                    sh.mergeCells('F7:G8'); sh.getCell('F7').value = "門片\n樣式:"; sh.mergeCells('H7:L8'); sh.getCell('H7').value = header.doorStyle;
                    for(let r=7; r<=8; r++) { for(let c=1; c<=12; c++) { const cell = sh.getCell(r, c); cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFCE4D6'}}; cell.border = b; cell.alignment = {horizontal:'center', vertical:'middle', wrapText:true}; cell.font = {bold:true, size: 14}; } }
                    const hRow = sh.getRow(9); hRow.height = 25; hRow.values = ['編號','洞寬','洞高','門寬','門高','牆厚','主體','線板','備註','樣式','門止','底'];
                    hRow.eachCell(c => { c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; c.border=b; c.alignment={horizontal:'center', vertical:'middle'}; c.font={bold:true, size:11}; });
                    let cur = 10; measurements.forEach((m) => {
                        const r = sh.getRow(cur++); r.height = 25; 
                        // 改為讀取動態欄位，預設為 房 / 隱 / 空白
                        r.values = [m.no, m.w, m.h, m.dw, m.dh, m.t, m.t, 50, m.note, m.style || "房", m.doorStop || "隱", m.bottom || ""];
                        r.eachCell((c, colIdx) => { c.border=b; c.alignment={horizontal:'center', vertical:'middle'}; c.font={bold:true, size:12}; if(colIdx === 9 && c.value) { c.font = { color:{argb:'FFFF0000'}, bold:true, size:12 }; } });
                    });

                    // =========================
                    // 完美排版區域 (左右對齊設計，下半部五金佔 4 格高度)
                    // =========================
                    const foot = cur; sh.getRow(foot).height = 25; 
                    sh.mergeCells(`A${foot}:D${foot}`); sh.getCell(`A${foot}`).value = "框門注意事項:"; 
                    sh.mergeCells(`E${foot}:L${foot}`); sh.getCell(`E${foot}`).value = "訂單備註:";
                    for(let c=1; c<=12; c++) { 
                        const cell = sh.getCell(foot, c); 
                        cell.font = {color:{argb:'FF0000FF'}, bold:true, size:12}; 
                        cell.border = b; 
                        cell.alignment = {vertical:'middle', horizontal:'left'}; 
                        cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; 
                    }
                    
                    // 左側：框門注意事項 (向下合併 8 列)
                    sh.mergeCells(`A${foot+1}:D${foot+8}`); 
                    sh.getCell(`A${foot+1}`).value = header.precautions || ""; 
                    sh.getCell(`A${foot+1}`).alignment = { vertical:'top', horizontal:'left', wrapText:true }; 
                    sh.getCell(`A${foot+1}`).font = { bold:true, size:12 };
                    
                    // 右側上半部：訂單備註 (向下合併 3 列)
                    let remarkText = header.orderRemark || "";
                    if (header.redNotice) remarkText += (remarkText ? '\n' : '') + header.redNotice;
                    
                    sh.mergeCells(`E${foot+1}:L${foot+3}`); 
                    sh.getCell(`E${foot+1}`).value = remarkText.trim(); 
                    sh.getCell(`E${foot+1}`).font = { color:{argb:'FFFF0000'}, size:22, bold:true }; 
                    sh.getCell(`E${foot+1}`).alignment = { vertical:'middle', horizontal:'center', wrapText:true };
                    
                    // 右側下半部：五金標題 (1 列)
                    sh.getRow(foot+4).height = 25; 
                    sh.mergeCells(`E${foot+4}:F${foot+4}`); sh.getCell(`E${foot+4}`).value = "防撞條"; 
                    sh.mergeCells(`G${foot+4}:H${foot+4}`); sh.getCell(`G${foot+4}`).value = "鉸鏈"; 
                    sh.mergeCells(`I${foot+4}:J${foot+4}`); sh.getCell(`I${foot+4}`).value = "門止"; 
                    sh.mergeCells(`K${foot+4}:L${foot+4}`); sh.getCell(`K${foot+4}`).value = "把手";
                    for(let c=5; c<=12; c++) { 
                        const cell = sh.getCell(foot+4, c); 
                        cell.alignment = {vertical:'middle', horizontal:'center'}; 
                        cell.font = {bold:true, size:12}; 
                        cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; 
                    }
                    
                    // 右側下半部：五金內容 (向下合併 4 列) - 保證四格空間
                    sh.mergeCells(`E${foot+5}:F${foot+8}`); sh.getCell(`E${foot+5}`).value = header.partCollision || ""; 
                    sh.mergeCells(`G${foot+5}:H${foot+8}`); sh.getCell(`G${foot+5}`).value = header.partHinge || ""; 
                    sh.mergeCells(`I${foot+5}:J${foot+8}`); sh.getCell(`I${foot+5}`).value = header.partStop || ""; 
                    sh.mergeCells(`K${foot+5}:L${foot+8}`); sh.getCell(`K${foot+5}`).value = header.partHandle || "";
                    for(let c=5; c<=12; c++) { 
                        const cell = sh.getCell(foot+5, c); 
                        cell.alignment = {vertical:'middle', horizontal:'center', wrapText:true}; 
                        cell.font = {bold:true, size:12}; 
                    }
                    
                    // 設定高度與畫框線 (確保 8 列高度統一)
                    for(let r=foot+1; r<=foot+8; r++) { 
                        sh.getRow(r).height = 25; 
                        for(let c=1; c<=12; c++) sh.getCell(r, c).border = b; 
                    }
                    
                    // 底部訂金與審核
                    const endRow = foot+9; 
                    sh.getRow(endRow).height = 25; 
                    sh.mergeCells(`A${endRow}:D${endRow}`); sh.getCell(`A${endRow}`).value = "訂金: " + (header.deposit || "0"); 
                    sh.mergeCells(`E${endRow}:L${endRow}`); sh.getCell(`E${endRow}`).value = "審核:";
                    for(let c=1; c<=12; c++) { 
                        const cell = sh.getCell(endRow, c); 
                        cell.font = {color:{argb:'FF0000FF'}, bold:true, size:14}; 
                        cell.border = b; 
                        cell.alignment = {vertical:'middle', horizontal:'left'}; 
                    }
                    
                    const buf = await wb.xlsx.writeBuffer(); const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([buf])); link.download = `丈量單_${header.orderNo}.xlsx`; link.click();
                } catch(e) { setAlertMsg({ title: "導出失敗", body: e.message, isError: true }); } finally { setIsLoading(false); }
            };

            const parseSpeech = async (text) => {
                if (!text.trim()) return;
                const currentApiKey = localApiKey || builtInApiKey;
                setIsLoading(true);
                const promptText = `你是一位專業丈量秘書。分析語音內容並填入 JSON。糾正錯字：門止(門子)、貝-WING(備贏)、子母(紫母)、防撞條(防狀)。結構：{ "header": { "address": "", "partHandle": "", "partCollision": "", "partStop": "", "partHinge": "", "orderRemark": "", "precautions": "" }, "items": [ { "no": "", "w": 0, "h": 0, "t": 0, "note": "", "style": "房", "doorStop": "隱", "bottom": "" } ] }`;
                try {
                    let data = null;
                    const models = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"];
                    for (const model of models) {
                        try {
                            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${currentApiKey}`;
                            const resp = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ contents: [{ parts: [{ text: `指令：${promptText}\n內容：${text}` }] }], generationConfig: { responseMimeType: "application/json" } })
                            });
                            if (resp.ok) { data = await resp.json(); break; }
                        } catch (err) {}
                    }
                    if (!data) throw new Error("AI 解析失敗，請檢查 API 金鑰。");
                    let rawText = data.candidates[0].content.parts[0].text;
                    const startIdx = rawText.indexOf('{'); const endIdx = rawText.lastIndexOf('}');
                    if (startIdx !== -1 && endIdx !== -1) rawText = rawText.substring(startIdx, endIdx + 1);
                    const result = JSON.parse(rawText);
                    if (result.header) setHeader({ ...header, ...result.header });
                    if (result.items) setMeasurements([...measurements, ...result.items.map((i, idx) => ({ id: Date.now()+idx, no: i.no || (measurements.length+idx+1)+".", w:Number(i.w)||0, h:Number(i.h)||0, dw:(Number(i.w)||48)-48, dh:(Number(i.h)||30)-30, t:Number(i.t)||0, note:i.note||"", style: i.style || "房", doorStop: i.doorStop || "隱", bottom: i.bottom || "" }))]);
                    setAlertMsg({ title: "解析完成", body: "數據已帶入！", isError: false });
                } catch (e) { setAlertMsg({ title: "解析失敗", body: e.message, isError: true }); } finally { setIsLoading(false); }
            };

            const syncToCloud = async () => {
                if (!db || !user || !header.orderNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', canvasAppId, 'public', 'data', 'cases', header.orderNo);
                    await window.FB.setDoc(docRef, { ...header, items: measurements, updatedAt: new Date().toISOString() });
                    setAlertMsg({ title: "同步成功", body: `[${header.orderNo}] 資料已成功存入雲端！`, isError: false });
                } catch (e) { 
                    setAlertMsg({ title: "同步失敗", body: `發生錯誤：${e.message}`, isError: true }); 
                } finally { 
                    setIsLoading(false); 
                }
            };

            const toggleRecording = () => {
                if (!recognitionRef.current) {
                    setAlertMsg({ title: "不支援語音", body: "您的瀏覽器不支援語音辨識功能，建議使用 Chrome 瀏覽器。", isError: true });
                    return;
                }
                if (isRecording) { recognitionRef.current.stop(); setIsRecording(false); }
                else { transcriptAccumulator.current = ""; setTranscript(""); recognitionRef.current.start(); setIsRecording(true); }
            };

            const loadCase = (c) => { 
                setHeader({ ...c }); 
                setMeasurements(c.items || []); 
                setView('main'); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-black text-2xl animate-pulse italic">系統連線中...</div>;

            return (
                <div className="min-h-screen flex flex-col pb-20 relative text-slate-800">
                    <nav className="bg-slate-900 text-white p-4 md:p-5 shadow-xl sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-white p-1 rounded-xl shadow-lg cursor-pointer" onClick={() => logoInputRef.current.click()}>
                                {logoImgBase64 && <img src={logoImgBase64} className="w-8 h-8 md:w-10 md:h-10 object-contain" alt="Logo" />}
                                <input type="file" ref={logoInputRef} hidden accept="image/*" onChange={(e) => {
                                    const file = e.target.files[0]; if (file) {
                                        const reader = new FileReader(); reader.onload = (ev) => { setLogoImgBase64(ev.target.result); localStorage.setItem('customLogo', ev.target.result); }; reader.readAsDataURL(file);
                                    }
                                }} />
                            </div>
                            <div className="cursor-pointer" onClick={() => setView("main")}>
                                <h1 className="text-lg md:text-2xl font-black italic uppercase">丈量尺寸</h1>
                                <span className="text-[9px] font-bold text-emerald-400">{version}</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowSettings(true)} className="bg-slate-800 p-2 rounded-xl text-slate-400"><Icon name="settings" className="w-5 h-5" /></button>
                            <button onClick={() => setView(view === 'main' ? 'history' : 'main')} className="bg-slate-800 px-3 py-2 rounded-xl text-xs font-black">{view === 'main' ? "紀錄" : "返回"}</button>
                            <button onClick={syncToCloud} className="bg-blue-600 px-4 py-2 rounded-xl text-sm font-black shadow-lg hover:bg-blue-500 active:scale-95 transition-all">同步</button>
                        </div>
                    </nav>

                    {view === "main" ? (
                        <main className="p-3 md:p-8 max-w-7xl mx-auto w-full space-y-6 animate-in fade-in duration-500">
                            
                            <div className="card p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                                <div className="space-y-1"><label className="text-xs font-black text-slate-400">編號</label><input value={header.orderNo} onChange={e=>setHeader({...header, orderNo: e.target.value})} className="w-full border-b-2 p-1 text-lg font-black text-blue-600 outline-none" /></div>
                                <div className="lg:col-span-2 space-y-1"><label className="text-xs font-black text-slate-400">地址</label><input value={header.address} onChange={e=>setHeader({...header, address: e.target.value})} className="w-full border-b-2 p-1 text-lg font-bold outline-none" /></div>
                                
                                <div className="md:col-span-2 bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100 mt-2 space-y-3">
                                    <div className="flex items-center gap-2 mb-1">
                                        <Icon name="link" className="w-5 h-5 text-indigo-600" />
                                        <label className="text-xs font-black text-indigo-700 uppercase tracking-widest">外部影片連結 / 備註</label>
                                    </div>
                                    <input 
                                        value={header.externalVideoLink || ""} 
                                        onChange={e=>setHeader({...header, externalVideoLink: e.target.value})} 
                                        className="w-full bg-white border border-indigo-200 p-3 rounded-xl text-sm font-bold shadow-inner focus:border-indigo-500 outline-none transition-colors" 
                                        placeholder="請貼上影片網址，或輸入文字備註" 
                                    />
                                </div>
                                <button onClick={exportExcel} className="md:col-span-2 bg-emerald-600 text-white py-3 rounded-xl text-sm font-black shadow-lg flex items-center justify-center gap-2 active:scale-95"><Icon name="file-spreadsheet" className="w-5 h-5" /> 匯出 EXCEL</button>
                            </div>
                            
                            <div className="bg-slate-900 rounded-3xl p-6 md:p-10 text-center relative overflow-hidden shadow-2xl">
                                {isLoading && <div className="absolute inset-0 bg-slate-900/95 z-30 flex items-center justify-center"><Icon name="loader-2" className="animate-spin text-blue-500 w-16 h-16" /></div>}
                                <button onClick={toggleRecording} className={`w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center mx-auto ${isRecording ? 'record-pulse' : 'bg-white'}`}>{isRecording ? <div className="w-8 h-8 bg-white"></div> : <Icon name="mic" className="w-10 h-10 text-slate-900" />}</button>
                                {transcript !== "" && (
                                    <div className="mt-6 space-y-4 text-left">
                                        <textarea value={transcript} onChange={(e) => setTranscript(e.target.value)} className="w-full bg-slate-800 text-white p-4 rounded-xl text-sm italic min-h-[80px]" />
                                        {!isRecording && <button onClick={() => parseSpeech(transcript)} className="mx-auto bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg">AI 解析數據</button>}
                                    </div>
                                )}
                            </div>

                            <div className="card overflow-hidden">
                                <div className="p-4 bg-slate-50 border-b flex justify-between items-center"><h3 className="section-title italic uppercase text-base">丈量數據列表</h3><button onClick={() => setMeasurements([...measurements, { id: Date.now(), no: (measurements.length+1)+".", w:0, h:0, dw:0, dh:0, t:0, note:"", style:"房", doorStop:"隱", bottom:"" }])} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-black shadow-sm">+ 新增</button></div>
                                <div className="overflow-x-auto no-scrollbar"><table className="w-full min-w-[1000px] text-center border-separate border-spacing-0"><thead className="bg-slate-50 text-[10px] text-slate-400 font-black uppercase border-b"><tr><th className="p-4">序號</th><th className="p-2 text-blue-700">洞寬</th><th className="p-2 text-blue-700">洞高</th><th className="p-2 text-emerald-600">門寬</th><th className="p-2 text-emerald-600">門高</th><th className="p-2">牆厚</th><th className="p-4 text-left w-48">備註</th><th className="p-2 text-indigo-600 w-16">樣式</th><th className="p-2 text-indigo-600 w-16">門止</th><th className="p-2 text-indigo-600 w-16">底</th><th></th></tr></thead>
                                <tbody className="divide-y divide-slate-100">{measurements.map(m => (<tr key={m.id} className="hover:bg-blue-50/20 group transition-colors"><td className="p-4 font-bold text-slate-400 italic">{m.no}</td><td className="p-2"><input type="number" value={m.w || ""} onChange={e=>{ const val=parseInt(e.target.value)||0; setMeasurements(measurements.map(x=>x.id===m.id?{...x, w:val, dw:val-48}:x)); }} className="w-full text-center text-lg font-black text-blue-800 outline-none bg-transparent" /></td><td className="p-2"><input type="number" value={m.h || ""} onChange={e=>{ const val=parseInt(e.target.value)||0; setMeasurements(measurements.map(x=>x.id===m.id?{...x, h:val, dh:val-30}:x)); }} className="w-full text-center text-lg font-black text-blue-800 outline-none bg-transparent" /></td><td className="p-2 font-black text-emerald-600 text-xl">{m.dw}</td><td className="p-2 font-black text-emerald-600 text-xl">{m.dh}</td><td className="p-2"><input type="number" value={m.t || ""} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, t:parseInt(e.target.value)||0}:x))} className="w-full text-center text-lg font-bold outline-none bg-transparent" /></td><td className="p-4 text-left"><input value={m.note} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, note:e.target.value}:x))} className="w-full text-sm font-bold italic outline-none bg-transparent" placeholder="備註..." /></td><td className="p-2"><input value={m.style || ""} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, style:e.target.value}:x))} className="w-full text-center text-sm font-bold text-indigo-700 outline-none bg-transparent placeholder-slate-300" placeholder="房" /></td><td className="p-2"><input value={m.doorStop || ""} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, doorStop:e.target.value}:x))} className="w-full text-center text-sm font-bold text-indigo-700 outline-none bg-transparent placeholder-slate-300" placeholder="隱" /></td><td className="p-2"><input value={m.bottom || ""} onChange={e=>setMeasurements(measurements.map(x=>x.id===m.id?{...x, bottom:e.target.value}:x))} className="w-full text-center text-sm font-bold text-indigo-700 outline-none bg-transparent" /></td><td><button onClick={()=>setMeasurements(measurements.filter(x=>x.id!==m.id))} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" className="w-5 h-5" /></button></td></tr>))}</tbody></table></div>
                            </div>

                            {/* 完美排版的 備註與五金配件區塊 */}
                            <div className="card p-5 md:p-10 space-y-6 bg-slate-50/50">
                                <h3 className="section-title italic tracking-widest uppercase">詳細備註與配件</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="flex flex-col space-y-2">
                                        <label className="text-xs font-black text-blue-600 uppercase tracking-widest bg-blue-100/50 px-2 py-1 rounded inline-block w-fit">框門注意事項</label>
                                        <textarea value={header.precautions} onChange={e=>setHeader({...header, precautions:e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl p-4 text-base font-bold resize-none outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-50 flex-1 min-h-[10rem] shadow-inner" />
                                    </div>
                                    <div className="flex flex-col space-y-2">
                                        <label className="text-xs font-black text-red-600 uppercase tracking-widest bg-red-100/50 px-2 py-1 rounded inline-block w-fit">訂單備註 (大紅字)</label>
                                        <textarea value={header.orderRemark} onChange={e=>setHeader({...header, orderRemark:e.target.value})} className="w-full bg-red-50/30 border border-red-200 rounded-xl p-4 text-red-600 font-black text-2xl text-center resize-none leading-relaxed shadow-inner outline-none focus:border-red-400 focus:ring-4 focus:ring-red-50 flex-1 min-h-[10rem]" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 pt-4 border-t border-slate-200">
                                    {['partCollision','partHinge','partStop','partHandle'].map((k, i) => (
                                        <div key={k} className="bg-white p-4 rounded-xl border border-slate-200 text-center shadow-sm">
                                            <label className="text-[10px] font-black text-slate-500 mb-2 block uppercase tracking-widest">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                            <textarea rows="3" value={header[k]} onChange={e=>setHeader({...header, [k]:e.target.value})} className="w-full bg-slate-50 border rounded-lg p-2 text-base font-black outline-none resize-none text-center focus:bg-white focus:border-blue-300 transition-colors" />
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-end gap-4 items-center pt-6 border-t border-slate-200">
                                    <label className="text-sm font-black text-slate-400 uppercase tracking-widest">訂金金額 (Deposit)</label>
                                    <input value={header.deposit} onChange={e=>setHeader({...header, deposit: e.target.value})} className="bg-white border-2 border-slate-100 p-2 rounded-lg text-right font-black text-blue-600 text-xl w-32 shadow-sm focus:border-blue-400 outline-none" />
                                </div>
                            </div>
                        </main>
                    ) : (
                        <main className="p-4 max-w-5xl mx-auto w-full animate-in slide-in-from-bottom duration-300">
                            <div className="card shadow-2xl">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center rounded-t-2xl">
                                    <h3 className="font-black italic text-lg uppercase tracking-widest text-emerald-400">雲端存檔清單</h3>
                                    <span className="bg-blue-600 px-3 py-1 rounded-full text-[10px] font-black italic">{allCases.length} 筆存檔</span>
                                </div>
                                <div className="divide-y divide-slate-100 max-h-[70vh] overflow-y-auto no-scrollbar">
                                    {allCases.map(c => (
                                        <div key={c.id} className="p-5 hover:bg-blue-50/50 transition-all flex justify-between items-center group">
                                            <div className="space-y-1">
                                                <p className="text-blue-600 font-black text-xl mb-1 tracking-tighter">[{c.orderNo || "無"}]</p>
                                                <p className="text-sm font-bold text-slate-500 truncate max-w-[180px] md:max-w-md">{c.address || "無地址"}</p>
                                                <p className="text-[10px] text-slate-300 font-bold italic">更新: {new Date(c.updatedAt).toLocaleString()}</p>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => loadCase(c)} className="bg-emerald-50 text-emerald-600 px-3 py-2 rounded-xl text-xs font-black flex items-center gap-1 active:scale-95 shadow-sm"><Icon name="edit-3" className="w-4 h-4" /> 編輯</button>
                                                <button onClick={(e) => { e.stopPropagation(); setConfirmDialog({ title: "刪除紀錄", body: `確定刪除 [${c.orderNo}] 嗎？`, onConfirm: async () => { try { await window.FB.deleteDoc(window.FB.doc(db, 'artifacts', canvasAppId, 'public', 'data', 'cases', c.orderNo)); setConfirmDialog(null); } catch(e){} } }); }} className="bg-red-50 text-red-400 p-2 rounded-xl active:scale-95 transition-all"><Icon name="trash-2" className="w-5 h-5" /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {allCases.length === 0 && <div className="p-16 text-center text-slate-400 font-black italic">尚無紀錄</div>}
                                </div>
                            </div>
                        </main>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full shadow-2xl animate-in zoom-in duration-200">
                                <h3 className="text-xl font-black mb-4">系統設定</h3>
                                <div className="space-y-4">
                                    <div><label className="text-xs font-black text-slate-500 mb-2 block uppercase">Gemini API Key</label><input type="password" value={localApiKey} onChange={e=>setLocalApiKey(e.target.value)} className="w-full border-2 rounded-xl p-3 font-bold text-sm outline-none focus:border-blue-500" /></div>
                                    <button onClick={()=>{localStorage.setItem('gemini_api_key', localApiKey.trim()); setShowSettings(false);}} className="w-full bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg">儲存設定</button>
                                    <button onClick={()=>setShowSettings(false)} className="w-full bg-slate-100 text-slate-500 py-3 rounded-xl font-black mt-2">關閉</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {alertMsg && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl animate-in zoom-in duration-200">
                                <div className={`w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center ${alertMsg.isError ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-500'}`}><Icon name={alertMsg.isError ? "alert-circle" : "check-circle-2"} className="w-8 h-8" /></div>
                                <h3 className="text-xl font-black mb-2">{alertMsg.title}</h3>
                                <p className="text-slate-500 text-sm font-bold whitespace-pre-wrap">{alertMsg.body}</p>
                                <button onClick={()=>setAlertMsg(null)} className="mt-6 w-full bg-slate-900 text-white py-3 rounded-xl font-black active:scale-95">確定</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
