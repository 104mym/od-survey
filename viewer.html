<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚下料單 - 師傅查看器</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .section-title { border-left: 4px solid #2563eb; padding-left: 10px; font-weight: 900; color: #1e293b; letter-spacing: 0.5px; font-size: 1rem; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.05); border: 1px solid #e2e8f0; overflow: hidden; }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 11px; padding: 2px 5px; border-radius: 4px; font-weight: 900; }
        @media (max-width: 640px) {
            .main-container { padding-left: 0.5rem; padding-right: 0.5rem; }
            .search-card { padding: 1.5rem 1rem !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, getFirestore, doc, getDoc };
    </script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const temp = document.createElement('div');
                    temp.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: temp });
                    const svg = temp.querySelector('svg');
                    if (svg) {
                        if (className) className.split(' ').forEach(c => { if (c.trim()) svg.classList.add(c.trim()); });
                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [searchNo, setSearchNo] = useState("");
            const [caseData, setCaseData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [logoImgBase64, setLogoImgBase64] = useState("");

            const firebaseConfig = {
                apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                authDomain: "tao-men.firebaseapp.com",
                projectId: "tao-men",
                storageBucket: "tao-men.firebasestorage.app",
                messagingSenderId: "332609297071",
                appId: "1:332609297071:web:03593a930475c97b87525a"
            };

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 160; canvas.height = 160;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 160, 160);
                    ctx.beginPath(); ctx.arc(80, 70, 60, 0, 2 * Math.PI);
                    ctx.lineWidth = 10; ctx.strokeStyle = 'black'; ctx.stroke();
                    ctx.font = '900 70px "Noto Serif TC", serif'; ctx.fillStyle = 'black';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 80, 78);
                    ctx.font = '900 18px "Noto Sans TC", sans-serif'; ctx.fillText('門扉美學館', 80, 145);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            useEffect(() => {
                getLogoBase64().then(url => setLogoImgBase64(url));
                const init = async () => {
                    try {
                        const app = window.FB.initializeApp(firebaseConfig);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        setIsReady(true);
                        const auth = window.FB.getAuth(app);
                        window.FB.signInAnonymously(auth).catch(e => console.warn("Auth skipped"));
                    } catch (e) { setIsReady(true); }
                };
                init();
            }, []);

            const handleSearch = async () => {
                if (!db || !searchNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-survey-system', 'public', 'data', 'cases', searchNo);
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) setCaseData(snap.data());
                    else alert("找不到案場，請確認編號是否正確。");
                } catch (e) { alert("讀取失敗"); }
                finally { setIsLoading(false); }
            };

            const exportExcel = async () => {
                if (!caseData) return;
                setIsLoading(true);
                try {
                    const wb = new window.ExcelJS.Workbook();
                    const sh = wb.addWorksheet('下料單');
                    sh.columns = [ { width: 6 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 22 }, { width: 6 }, { width: 6 }, { width: 6 } ];
                    const b = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    
                    sh.mergeCells('A1:B3');
                    if (logoImgBase64) {
                        const img = wb.addImage({ base64: logoImgBase64.split(',')[1], extension: 'png' });
                        sh.addImage(img, { tl: { col: 0, row: 0 }, br: { col: 2, row: 3 }, editAs: 'oneCell' });
                    }
                    sh.mergeCells('C1:H3');
                    const tit = sh.getCell('C1'); tit.value = '下 料 單'; tit.font = { size: 24, bold: true }; tit.alignment = { vertical:'middle', horizontal:'center' };
                    
                    sh.getCell('I1').value = '訂單編號:'; sh.mergeCells('J1:L1'); sh.getCell('J1').value = caseData.orderNo;
                    sh.getCell('I2').value = '丈量人員:'; sh.mergeCells('J2:L2'); sh.getCell('J2').value = caseData.surveyor || "";
                    sh.getCell('I3').value = '日期:'; sh.mergeCells('J3:L3'); sh.getCell('J3').value = new Date().toISOString().slice(0,10);
                    
                    sh.mergeCells('A4:B4'); sh.getCell('A4').value = '公   司:'; sh.mergeCells('C4:L4'); sh.getCell('C4').value = caseData.company || "";
                    sh.mergeCells('A5:B5'); sh.getCell('A5').value = '聯 絡 人:'; sh.mergeCells('C5:E5'); sh.getCell('C5').value = caseData.contact || ""; 
                    sh.mergeCells('F5:G5'); sh.getCell('F5').value = '電   話:'; sh.mergeCells('H5:L5'); sh.getCell('H5').value = caseData.phone || "";
                    sh.mergeCells('A6:B6'); sh.getCell('A6').value = '案場地址:'; sh.mergeCells('C6:L6'); sh.getCell('C6').value = caseData.address || ""; 
                    
                    for(let r=1; r<=6; r++) { sh.getRow(r).height = 25; for(let c=1; c<=12; c++) { const cell = sh.getCell(r, c); cell.border = b; cell.alignment = { vertical:'middle', horizontal:'left' }; cell.font = { bold:true, size:12 }; } }
                    
                    sh.getRow(7).height = 25; sh.getRow(8).height = 25;
                    sh.mergeCells('A7:B8'); sh.getCell('A7').value = "門框樣式:"; sh.mergeCells('C7:E8'); sh.getCell('C7').value = caseData.frameStyle || "";
                    sh.mergeCells('F7:G8'); sh.getCell('F7').value = "門片樣式:"; sh.mergeCells('H7:L8'); sh.getCell('H7').value = caseData.doorStyle || "";
                    for(let r=7; r<=8; r++) { for(let c=1; c<=12; c++) { const cell = sh.getCell(r, c); cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFCE4D6'}}; cell.border = b; cell.alignment = {horizontal:'center', vertical:'middle', wrapText:true}; cell.font = {bold:true, size: 14}; } }
                    
                    const hRow = sh.getRow(9); hRow.height = 25; hRow.values = ['編號','洞寬','洞高','門寬','門高','牆厚','主體','線板','備註','樣式','門止','底'];
                    hRow.eachCell(c => { c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; c.border=b; c.alignment={horizontal:'center', vertical:'middle'}; c.font={bold:true, size:11}; });
                    
                    let cur = 10; (caseData.items || []).forEach((m) => {
                        const r = sh.getRow(cur++); r.height = 25; 
                        r.values = [m.no, m.w, m.h, m.dw, m.dh, m.t, m.t, 50, m.note, m.style || "房", m.doorStop || "隱", m.bottom || ""];
                        r.eachCell((c, colIdx) => { c.border=b; c.alignment={horizontal:'center', vertical:'middle'}; c.font={bold:true, size:12}; if(colIdx === 9 && c.value) { c.font = { color:{argb:'FFFF0000'}, bold:true, size:12 }; } });
                    });
                    
                    // =========================
                    // 完美排版區域 (左右對齊設計，下半部五金佔 4 格高度)
                    // =========================
                    const foot = cur; sh.getRow(foot).height = 25; 
                    sh.mergeCells(`A${foot}:D${foot}`); sh.getCell(`A${foot}`).value = "樣式:"; 
                    sh.mergeCells(`E${foot}:L${foot}`); sh.getCell(`E${foot}`).value = "訂單備註:";
                    for(let c=1; c<=12; c++) { 
                        const cell = sh.getCell(foot, c); 
                        cell.font = {color:{argb:'FF0000FF'}, bold:true, size:12}; 
                        cell.border = b; 
                        cell.alignment = {vertical:'middle', horizontal:'left'}; 
                        cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; 
                    }
                    
                    // 左側：樣式圖片 (向下合併 8 列)
                    sh.mergeCells(`A${foot+1}:D${foot+8}`); 
                    if (caseData.styleImageBase64) {
                        try {
                            const imgId = wb.addImage({
                                base64: caseData.styleImageBase64.split(',')[1],
                                extension: 'jpeg',
                            });
                            sh.addImage(imgId, {
                                tl: { col: 0.1, row: foot + 0.1 },
                                br: { col: 3.9, row: foot + 7.9 },
                                editAs: 'oneCell'
                            });
                        } catch (e) {
                            console.warn("Excel加入圖片失敗", e);
                        }
                    }
                    
                    // 右側上半部：訂單備註 (向下合併 3 列)
                    let remarkText = caseData.orderRemark || "";
                    if (caseData.redNotice) remarkText += (remarkText ? '\n' : '') + caseData.redNotice;
                    
                    sh.mergeCells(`E${foot+1}:L${foot+3}`); 
                    sh.getCell(`E${foot+1}`).value = remarkText.trim(); 
                    sh.getCell(`E${foot+1}`).font = { color:{argb:'FFFF0000'}, size:22, bold:true }; 
                    sh.getCell(`E${foot+1}`).alignment = { vertical:'middle', horizontal:'center', wrapText:true };
                    
                    // 右側下半部：五金標題 (1 列)
                    sh.getRow(foot+4).height = 25; 
                    sh.mergeCells(`E${foot+4}:F${foot+4}`); sh.getCell(`E${foot+4}`).value = "防撞條"; 
                    sh.mergeCells(`G${foot+4}:H${foot+4}`); sh.getCell(`G${foot+4}`).value = "鉸鏈"; 
                    sh.mergeCells(`I${foot+4}:J${foot+4}`); sh.getCell(`I${foot+4}`).value = "門止"; 
                    sh.mergeCells(`K${foot+4}:L${foot+4}`); sh.getCell(`K${foot+4}`).value = "把手";
                    for(let c=5; c<=12; c++) { 
                        const cell = sh.getCell(foot+4, c); 
                        cell.alignment = {vertical:'middle', horizontal:'center'}; 
                        cell.font = {bold:true, size:12}; 
                        cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; 
                    }
                    
                    // 右側下半部：五金內容 (向下合併 4 列) - 保證四格空間
                    sh.mergeCells(`E${foot+5}:F${foot+8}`); sh.getCell(`E${foot+5}`).value = caseData.partCollision || ""; 
                    sh.mergeCells(`G${foot+5}:H${foot+8}`); sh.getCell(`G${foot+5}`).value = caseData.partHinge || ""; 
                    sh.mergeCells(`I${foot+5}:J${foot+8}`); sh.getCell(`I${foot+5}`).value = caseData.partStop || ""; 
                    sh.mergeCells(`K${foot+5}:L${foot+8}`); sh.getCell(`K${foot+5}`).value = caseData.partHandle || "";
                    for(let c=5; c<=12; c++) { 
                        const cell = sh.getCell(foot+5, c); 
                        cell.alignment = {vertical:'middle', horizontal:'center', wrapText:true}; 
                        cell.font = {bold:true, size:12}; 
                    }
                    
                    // 設定高度與畫框線 (確保 8 列高度統一)
                    for(let r=foot+1; r<=foot+8; r++) { 
                        sh.getRow(r).height = 25; 
                        for(let c=1; c<=12; c++) sh.getCell(r, c).border = b; 
                    }
                    
                    const buf = await wb.xlsx.writeBuffer(); const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([buf])); link.download = `智揚下料單_${caseData.orderNo}.xlsx`; link.click();
                } catch(e) { alert("導出失敗"); } finally { setIsLoading(false); }
            };

            const handleBack = () => {
                setCaseData(null);
                setSearchNo("");
            };

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-bold text-lg animate-pulse uppercase italic tracking-widest">系統連線中...</div>;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-10">
                    <nav className="bg-slate-900 text-white p-3 shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center w-full">
                            <div className="flex items-center gap-2">
                                {logoImgBase64 && <img src={logoImgBase64} alt="Logo" className="w-8 h-8 object-contain rounded bg-white p-0.5 shadow" />}
                                <div>
                                    <h1 className="text-lg font-black tracking-tight leading-none italic">智揚助理</h1>
                                    <span className="text-[8px] font-bold text-emerald-400 uppercase tracking-widest leading-none">Worker View</span>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                {caseData && <button onClick={exportExcel} disabled={isLoading} className="text-xs font-black bg-emerald-600 px-3 py-1.5 rounded-lg border border-emerald-500 shadow-lg flex items-center gap-1 active:scale-95 transition-all"><Icon name="file-spreadsheet" className="w-4 h-4" /> 匯出</button>}
                                {caseData && <button onClick={handleBack} className="bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-1 border border-white/10 active:scale-95 transition-all">返回</button>}
                            </div>
                        </div>
                    </nav>

                    <main className="main-container max-w-7xl mx-auto w-full space-y-4 mt-2 px-2">
                        
                        {!caseData ? (
                            <div className="card search-card p-8 text-center space-y-5 max-w-md mx-auto mt-12 border-2 border-slate-100 shadow-xl">
                                <div>
                                    <Icon name="search" className="w-10 h-10 text-slate-200 mb-2 mx-auto" />
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] block">請輸入訂單編號查詢</label>
                                </div>
                                
                                <div className="flex flex-col gap-4 w-full">
                                    <input 
                                        placeholder="例如: 20260502" 
                                        value={searchNo} 
                                        onChange={e=>setSearchNo(e.target.value)} 
                                        onKeyDown={e=>e.key==='Enter'&&handleSearch()} 
                                        className="w-full px-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl font-black text-indigo-600 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 text-center" 
                                    />
                                    <button 
                                        onClick={handleSearch} 
                                        disabled={isLoading} 
                                        className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg active:scale-95 transition-all flex items-center justify-center gap-3 shadow-lg shadow-slate-200"
                                    >
                                        {isLoading ? (
                                            <div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin"></div>
                                        ) : (
                                            <>
                                                <Icon name="arrow-right-circle" className="w-6 h-6" />
                                                立即查看案場
                                            </>
                                        )}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in slide-in-from-bottom-4 fade-in duration-300 px-1">
                                
                                {/* 案場簡介 */}
                                <div className="card p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-4 border-b-4 border-blue-500">
                                    <div className="lg:col-span-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">訂單編號</label>
                                        <div className="text-sm font-black text-blue-600 tracking-tighter">[{caseData.orderNo}]</div>
                                    </div>
                                    <div className="lg:col-span-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">丈量人員</label>
                                        <div className="text-sm font-bold text-slate-700 truncate">{caseData.surveyor || '-'}</div>
                                    </div>
                                    <div className="lg:col-span-4">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">案場地址</label>
                                        <div className="text-sm font-bold text-slate-700 truncate">{caseData.address || '-'}</div>
                                    </div>
                                    <div className="lg:col-span-2">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">公司</label>
                                        <div className="text-sm font-bold text-slate-700 truncate">{caseData.company || '-'}</div>
                                    </div>
                                    <div className="lg:col-span-2">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">聯絡人</label>
                                        <div className="text-sm font-bold text-slate-700 truncate">{caseData.contact || '-'}</div>
                                    </div>
                                    <div className="lg:col-span-2 flex items-center justify-between">
                                        <div>
                                            <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">電話</label>
                                            <div className="text-sm font-bold text-slate-700 truncate">{caseData.phone || '-'}</div>
                                        </div>
                                        <div className="bg-blue-50 rounded-xl p-2 flex flex-col items-center px-4 border border-blue-100">
                                            <label className="text-[9px] font-black text-blue-400 uppercase leading-none mb-1">總樘數</label>
                                            <div className="text-xl font-black text-blue-600 leading-none">{caseData.items?.length || 0}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 影片顯示區 (支援智慧判斷網址 或 純文字備註) */}
                                {caseData.videoLink && !caseData.externalVideoLink ? (
                                    <div className="bg-black rounded-2xl overflow-hidden shadow-lg aspect-video max-w-2xl mx-auto border-4 border-white relative group">
                                        <video src={caseData.videoLink} controls playsInline className="w-full h-full object-cover"></video>
                                    </div>
                                ) : caseData.externalVideoLink ? (
                                    <div className="card p-6 bg-indigo-50 border-indigo-200 flex flex-col items-center justify-center gap-3 text-center">
                                        <Icon name="link" className="w-8 h-8 text-indigo-500" />
                                        <p className="text-xs font-black text-slate-500 uppercase tracking-widest">外部影片連結 / 備註</p>
                                        {/* 自動判斷是否為網址 */}
                                        {caseData.externalVideoLink.startsWith('http') ? (
                                            <a href={caseData.externalVideoLink} target="_blank" rel="noopener noreferrer" className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black shadow-lg flex items-center gap-2 active:scale-95 transition-all">
                                                <Icon name="external-link" className="w-5 h-5" /> 點擊前往觀看
                                            </a>
                                        ) : (
                                            <p className="text-lg font-black text-indigo-700 bg-white px-4 py-2 rounded-lg border border-indigo-100">{caseData.externalVideoLink}</p>
                                        )}
                                    </div>
                                ) : (
                                    <div className="card p-8 text-center text-slate-300 font-black italic border-dashed border-2">本案場無影片紀錄</div>
                                )}

                                {/* 樣式 */}
                                <div className="bg-orange-50 rounded-2xl p-4 border border-orange-100 grid grid-cols-2 gap-4 shadow-inner">
                                    <div>
                                        <label className="text-[9px] font-black text-orange-400 uppercase tracking-widest block">門框樣式</label>
                                        <div className="text-sm font-bold text-orange-900 border-b border-orange-200">{caseData.frameStyle || '同門片'}</div>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-orange-400 uppercase tracking-widest block">門片樣式</label>
                                        <div className="text-sm font-bold text-orange-900 border-b border-orange-200">{caseData.doorStyle || '平烤正白'}</div>
                                    </div>
                                </div>

                                {/* 表格 - 純唯讀 */}
                                <div className="card overflow-hidden">
                                    <div className="p-3 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                                        <h3 className="section-title italic">丈量明細表</h3>
                                    </div>
                                    <div className="overflow-x-auto no-scrollbar">
                                        <table className="w-full text-left min-w-[900px] border-separate border-spacing-0">
                                            <thead className="bg-slate-50 text-[9px] text-slate-400 font-black uppercase sticky top-0 z-20 shadow-sm border-b">
                                                <tr>
                                                    <th className="px-4 py-3 w-10 text-center">#</th>
                                                    <th className="px-2 py-3 text-blue-700 w-16 text-center">洞寬 W</th>
                                                    <th className="px-2 py-3 text-blue-700 w-16 text-center">洞高 H</th>
                                                    <th className="px-2 py-3 text-emerald-600 border-x border-slate-100 bg-emerald-50/30 w-20 text-center">門寬(-48)</th>
                                                    <th className="px-2 py-3 text-emerald-600 border-r border-slate-100 bg-emerald-50/30 w-20 text-center">門高(-30)</th>
                                                    <th className="px-2 py-3 text-center w-14">牆厚 T</th>
                                                    <th className="px-4 py-3 text-left">備註</th>
                                                    <th className="px-2 py-3 text-indigo-600 w-14 text-center">樣式</th>
                                                    <th className="px-2 py-3 text-indigo-600 w-14 text-center">門止</th>
                                                    <th className="px-2 py-3 text-indigo-600 w-14 text-center">底</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 text-sm">
                                                {caseData.items?.map((m, idx) => (
                                                    <tr key={idx} className="hover:bg-blue-50/30 transition-all">
                                                        <td className="px-4 py-4 font-bold text-slate-300 text-xs text-center italic">{m.no}</td>
                                                        <td className="px-2 py-4 font-black text-xl text-blue-900 text-center">{m.w}</td>
                                                        <td className="px-2 py-4 font-black text-xl text-blue-900 text-center">{m.h}</td>
                                                        <td className="px-2 py-4 bg-emerald-50/30 font-black text-emerald-600 text-2xl tracking-tighter text-center border-x border-slate-100">{m.dw}</td>
                                                        <td className="px-2 py-4 bg-emerald-50/30 font-black text-emerald-600 text-2xl tracking-tighter text-center border-r border-slate-100">{m.dh}</td>
                                                        <td className="px-2 py-4 text-xl font-black text-slate-700 text-center">{m.t}</td>
                                                        <td className="px-4 py-4 font-bold text-slate-700 text-left">{m.note || '-'}</td>
                                                        <td className="px-2 py-4 font-bold text-indigo-700 text-center">{m.style || '房'}</td>
                                                        <td className="px-2 py-4 font-bold text-indigo-700 text-center">{m.doorStop || '隱'}</td>
                                                        <td className="px-2 py-4 font-bold text-indigo-700 text-center">{m.bottom || '-'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* 五金配件與備註：左側圖片，右側訂單備註 */}
                                <div className="card p-5 space-y-6 bg-slate-50/50">
                                    <h3 className="section-title uppercase tracking-widest">詳細備註與五金</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {/* 樣式圖片唯讀顯示 */}
                                        <div className="bg-white p-4 rounded-xl border border-slate-200 flex flex-col shadow-sm">
                                            <label className="text-[10px] font-black text-blue-500 block mb-2 tracking-widest uppercase">樣式 (設計圖/草圖)</label>
                                            <div className="w-full flex-1 flex items-center justify-center min-h-[10rem] bg-slate-50 rounded-lg overflow-hidden border border-slate-100 relative">
                                                {caseData.styleImageBase64 ? (
                                                    <img src={caseData.styleImageBase64} alt="樣式" className="w-full h-full object-contain absolute inset-0 m-auto" />
                                                ) : (
                                                    <span className="text-slate-300 font-bold text-sm tracking-widest italic">無樣式圖片</span>
                                                )}
                                            </div>
                                        </div>
                                        
                                        {/* 訂單備註 */}
                                        <div className="bg-red-50/50 p-4 rounded-2xl border border-red-100 flex flex-col text-center min-h-[10rem] shadow-inner">
                                            <label className="text-[10px] font-black text-red-500 block mb-2 uppercase tracking-widest">訂單備註</label>
                                            <div className="text-2xl font-black text-red-600 leading-tight flex-1 flex items-center justify-center whitespace-pre-wrap">
                                                {(caseData.orderRemark || '') + (caseData.orderRemark && caseData.redNotice ? '\n' : '') + (caseData.redNotice || '') || '無'}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 border-t border-slate-200 pt-4">
                                        {['partCollision','partHinge','partStop','partHandle'].map((key, i) => (
                                            <div key={key} className="bg-white p-3 rounded-xl border border-slate-200 shadow-sm text-center">
                                                <label className="text-[9px] font-black text-slate-400 mb-1 block uppercase tracking-tighter">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                                <div className="w-full bg-slate-50 border rounded-lg p-2 text-base font-black text-slate-700 min-h-[4rem] flex items-center justify-center whitespace-pre-wrap leading-tight">{caseData[key] || '-'}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-auto py-8 text-center opacity-20 text-[8px] font-black uppercase tracking-[0.4em]">
                        Zhiyang Official Worker Viewer v4.4.1
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
