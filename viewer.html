<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚下料單 - 師傅查看器</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Excel 匯出函式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.05); border: 1px solid #e2e8f0; overflow: hidden; }
        .section-title { border-left: 4px solid #2563eb; padding-left: 10px; font-weight: 900; color: #1e293b; font-size: 1rem; }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 11px; padding: 2px 5px; border-radius: 4px; font-weight: 900; }
        @media (max-width: 640px) {
            .main-container { padding-left: 0.5rem; padding-right: 0.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, getFirestore, doc, getDoc };
    </script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const temp = document.createElement('div');
                    temp.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: temp });
                    const svg = temp.querySelector('svg');
                    if (svg) {
                        if (className) className.split(' ').forEach(c => { if (c.trim()) svg.classList.add(c.trim()); });
                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [searchNo, setSearchNo] = useState("");
            const [caseData, setCaseData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [logoImgBase64, setLogoImgBase64] = useState("");

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas'); canvas.width = 300; canvas.height = 300;
                    const ctx = canvas.getContext('2d'); ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 300, 300);
                    // 畫圓圈
                    ctx.beginPath(); ctx.arc(150, 130, 100, 0, 2 * Math.PI); ctx.lineWidth = 15; ctx.strokeStyle = '#000'; ctx.stroke();
                    // 畫「匠」
                    ctx.font = '900 120px "Noto Serif TC", serif'; ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 150, 140);
                    // 畫「門扉美學館」
                    ctx.font = '900 32px "Noto Sans TC", sans-serif'; ctx.fillText('門 扉 美 學 館', 150, 260);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            useEffect(() => {
                const savedLogo = localStorage.getItem('customLogo');
                if (savedLogo) setLogoImgBase64(savedLogo);
                else getLogoBase64().then(url => setLogoImgBase64(url));

                const init = async () => {
                    try {
                        const firebaseConfig = {
                            apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                            authDomain: "tao-men.firebaseapp.com",
                            projectId: "tao-men",
                            storageBucket: "tao-men.firebasestorage.app",
                            messagingSenderId: "332609297071",
                            appId: "1:332609297071:web:03593a930475c97b87525a"
                        };
                        const app = window.FB.initializeApp(firebaseConfig);
                        setDb(window.FB.getFirestore(app));
                        await window.FB.signInAnonymously(window.FB.getAuth(app));
                        setIsReady(true);
                    } catch (e) { setIsReady(true); }
                };
                init();
            }, []);

            const exportExcel = async () => {
                if (!caseData) return;
                setIsLoading(true);
                try {
                    const wb = new window.ExcelJS.Workbook();
                    const sh = wb.addWorksheet('下料單');
                    // 設定欄寬
                    sh.columns = [
                        { width: 6 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, { width: 8 }, 
                        { width: 8 }, { width: 8 }, { width: 22 }, { width: 6 }, { width: 6 }, { width: 6 }
                    ];
                    const b = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                    
                    // 1. Logo 區
                    sh.mergeCells('A1:B3');
                    if (logoImgBase64) {
                        const img = wb.addImage({ base64: logoImgBase64.split(',')[1], extension: 'png' });
                        sh.addImage(img, { tl: { col: 0, row: 0 }, br: { col: 2, row: 3 }, editAs: 'oneCell' });
                    }
                    
                    // 2. 標題與基本資訊
                    sh.mergeCells('C1:H3');
                    const tit = sh.getCell('C1'); tit.value = '下 料 單'; tit.font = { size: 24, bold: true }; tit.alignment = { vertical:'middle', horizontal:'center' };

                    sh.getCell('I1').value = '訂單編號:'; sh.mergeCells('J1:L1'); sh.getCell('J1').value = caseData.orderNo || "";
                    sh.getCell('I2').value = '丈量人員:'; sh.mergeCells('J2:L2'); sh.getCell('J2').value = caseData.surveyor || "";
                    sh.getCell('I3').value = '丈量日期:'; sh.mergeCells('J3:L3'); sh.getCell('J3').value = (caseData.updatedAt || "").slice(0,10);
                    
                    sh.mergeCells('A4:B4'); sh.getCell('A4').value = '公   司:'; sh.mergeCells('C4:L4'); sh.getCell('C4').value = caseData.company || "";
                    
                    sh.mergeCells('A5:B5'); sh.getCell('A5').value = '聯 絡 人:'; sh.mergeCells('C5:E5'); sh.getCell('C5').value = caseData.contact || ""; 
                    sh.mergeCells('F5:G5'); sh.getCell('F5').value = '電   話:'; sh.mergeCells('H5:L5'); sh.getCell('H5').value = caseData.phone || "";
                    
                    sh.mergeCells('A6:B6'); sh.getCell('A6').value = '案場地址:'; sh.mergeCells('C6:L6'); sh.getCell('C6').value = caseData.address || ""; 

                    // 套用基本框線樣式 (Row 1-6)
                    for(let r=1; r<=6; r++) {
                        sh.getRow(r).height = 25;
                        for(let c=1; c<=12; c++) {
                            const cell = sh.getCell(r, c);
                            cell.border = b; cell.alignment = { vertical:'middle', horizontal:'left' }; cell.font = { bold:true, size:12 };
                        }
                    }

                    // 3. 門樣式區
                    sh.getRow(7).height = 25; sh.getRow(8).height = 25;
                    sh.mergeCells('A7:B8'); sh.getCell('A7').value = "門框\n樣式:"; 
                    sh.mergeCells('C7:E8'); sh.getCell('C7').value = caseData.frameStyle || "";
                    sh.mergeCells('F7:G8'); sh.getCell('F7').value = "門片\n樣式:"; 
                    sh.mergeCells('H7:L8'); sh.getCell('H7').value = caseData.doorStyle || "";
                    for(let r=7; r<=8; r++) {
                        for(let c=1; c<=12; c++) {
                            const cell = sh.getCell(r, c);
                            cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFCE4D6'}}; 
                            cell.border = b; 
                            cell.alignment = {horizontal:'center', vertical:'middle', wrapText:true}; 
                            cell.font = {bold:true, size: 14};
                        }
                    }

                    // 4. 表格標題
                    const hRow = sh.getRow(9); hRow.height = 25;
                    hRow.values = ['編號','洞寬','洞高','門寬','門高','牆厚','主體','線板','備註','樣式','門止','底'];
                    hRow.eachCell(c => { 
                        c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}}; 
                        c.border=b; 
                        c.alignment={horizontal:'center', vertical:'middle'}; 
                        c.font={bold:true, size:11}; 
                    });

                    // 5. 數據列
                    let cur = 10;
                    (caseData.items || []).forEach((m) => {
                        const r = sh.getRow(cur++); r.height = 25;
                        r.values = [m.no, m.w, m.h, m.dw, m.dh, m.t, m.t, 50, m.note, "房", "隱", ""];
                        r.eachCell((c, colIdx) => { 
                            c.border=b; c.alignment={horizontal:'center', vertical:'middle'}; c.font={bold:true, size:12};
                            if(colIdx === 9 && c.value) { c.font = { color:{argb:'FFFF0000'}, bold:true, size:12 }; }
                        });
                    });

                    // 6. 腳位 (注意事項與大紅字)
                    const foot = cur; 
                    sh.getRow(foot).height = 25;
                    sh.mergeCells(`A${foot}:D${foot}`); sh.getCell(`A${foot}`).value = "框門注意事項:";
                    sh.mergeCells(`E${foot}:L${foot}`); sh.getCell(`E${foot}`).value = "訂單備註:";
                    for(let c=1; c<=12; c++) {
                        const cell = sh.getCell(foot, c);
                        cell.font = {color:{argb:'FF0000FF'}, bold:true, size:12}; cell.border = b; cell.alignment = {vertical:'middle', horizontal:'left'};
                        cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
                    }

                    sh.mergeCells(`A${foot+1}:D${foot+6}`);
                    const precCell = sh.getCell(`A${foot+1}`); precCell.value = caseData.precautions || "";
                    precCell.alignment = { vertical:'top', horizontal:'left', wrapText:true }; precCell.font = { bold:true, size:12 };
                    
                    sh.mergeCells(`E${foot+1}:L${foot+3}`);
                    const redCell = sh.getCell(`E${foot+1}`);
                    redCell.value = (caseData.orderRemark ? caseData.orderRemark + '\n' : '') + (caseData.redNotice || "");
                    redCell.font = { color:{argb:'FFFF0000'}, size:22, bold:true }; redCell.alignment = { vertical:'middle', horizontal:'center', wrapText:true };

                    // 7. 五金配件區
                    sh.getRow(foot+4).height = 25;
                    sh.mergeCells(`E${foot+4}:F${foot+4}`); sh.getCell(`E${foot+4}`).value = "防撞條";
                    sh.mergeCells(`G${foot+4}:H${foot+4}`); sh.getCell(`G${foot+4}`).value = "鉸鏈";
                    sh.mergeCells(`I${foot+4}:J${foot+4}`); sh.getCell(`I${foot+4}`).value = "門止";
                    sh.mergeCells(`K${foot+4}:L${foot+4}`); sh.getCell(`K${foot+4}`).value = "把手";
                    for(let c=5; c<=12; c++) {
                        const cell = sh.getCell(foot+4, c); cell.alignment = {vertical:'middle', horizontal:'center'}; cell.font = {bold:true, size:12};
                        cell.fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
                    }

                    sh.mergeCells(`E${foot+5}:F${foot+6}`); sh.getCell(`E${foot+5}`).value = caseData.partCollision || "";
                    sh.mergeCells(`G${foot+5}:H${foot+6}`); sh.getCell(`G${foot+5}`).value = caseData.partHinge || "";
                    sh.mergeCells(`I${foot+5}:J${foot+6}`); sh.getCell(`I${foot+5}`).value = caseData.partStop || "";
                    sh.mergeCells(`K${foot+5}:L${foot+6}`); sh.getCell(`K${foot+5}`).value = caseData.partHandle || "";
                    for(let c=5; c<=12; c++) {
                        const cell = sh.getCell(foot+5, c); cell.alignment = {vertical:'middle', horizontal:'center', wrapText:true}; cell.font = {bold:true, size:12};
                    }

                    for(let r=foot+1; r<=foot+6; r++) { for(let c=1; c<=12; c++) sh.getCell(r, c).border = b; }

                    // 8. 最後一行 (訂金)
                    const endRow = foot+7; sh.getRow(endRow).height = 25;
                    sh.mergeCells(`A${endRow}:D${endRow}`); sh.getCell(`A${endRow}`).value = `訂金: ${caseData.deposit || '0'}`;
                    sh.mergeCells(`E${endRow}:L${endRow}`); sh.getCell(`E${endRow}`).value = "審核:";
                    for(let c=1; c<=12; c++) {
                        const cell = sh.getCell(endRow, c); cell.font = {color:{argb:'FF0000FF'}, bold:true, size:14}; cell.border = b; cell.alignment = {vertical:'middle', horizontal:'left'};
                    }

                    // 下載檔案
                    const buf = await wb.xlsx.writeBuffer();
                    const link = document.createElement("a");
                    const blob = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                    link.href = URL.createObjectURL(blob);
                    link.download = `智揚下料單_${caseData.orderNo}.xlsx`;
                    link.click();
                } catch(e) { 
                    console.error(e);
                    alert("Excel 匯出失敗，請檢查網路或數據。"); 
                } finally { 
                    setIsLoading(false); 
                }
            };

            const handleSearch = async () => {
                if (!db || !searchNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-survey-system', 'public', 'data', 'cases', searchNo);
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) setCaseData(snap.data());
                    else alert("找不到此編號，請確認後再搜尋。");
                } catch (e) { alert("連線錯誤，請稍後再試。"); }
                finally { setIsLoading(false); }
            };

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-black animate-pulse uppercase tracking-widest italic">智揚系統 連線中...</div>;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-10">
                    <nav className="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            {logoImgBase64 && <img src={logoImgBase64} alt="Logo" className="w-8 h-8 object-contain rounded bg-white p-0.5" />}
                            <h1 className="text-xl font-black italic">智揚查看器</h1>
                        </div>
                        <div className="flex gap-2">
                            {caseData && (
                                <button 
                                    onClick={exportExcel} 
                                    disabled={isLoading}
                                    className="text-xs font-black bg-emerald-600 px-3 py-1.5 rounded-lg border border-emerald-500 shadow-lg flex items-center gap-1 active:scale-95 transition-all"
                                >
                                    <Icon name={isLoading ? "loader-2" : "file-spreadsheet"} className={`w-4 h-4 ${isLoading ? 'animate-spin' : ''}`} /> 
                                    {isLoading ? "處理中..." : "匯出 EXCEL"}
                                </button>
                            )}
                            {caseData && <button onClick={()=>setCaseData(null)} className="text-xs font-black bg-slate-800 px-3 py-1.5 rounded-lg border border-white/10">重新搜尋</button>}
                        </div>
                    </nav>

                    <main className="main-container max-w-4xl mx-auto w-full p-4 space-y-4">
                        {!caseData ? (
                            <div className="card p-8 text-center space-y-6 max-w-sm mx-auto mt-20">
                                <Icon name="search" className="w-12 h-12 text-slate-200 mb-2 mx-auto" />
                                <h2 className="text-lg font-black text-slate-400 tracking-widest uppercase">請輸入訂單編號</h2>
                                <input placeholder="編號" value={searchNo} onChange={e=>setSearchNo(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSearch()} className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-2xl font-black text-center text-blue-600 outline-none focus:border-blue-500" />
                                <button onClick={handleSearch} disabled={isLoading} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all">立即查看</button>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in slide-in-from-bottom-4 duration-300">
                                <div className="card p-4 border-b-4 border-blue-600 flex justify-between items-center shadow-lg">
                                    <div className="space-y-1">
                                        <p className="text-blue-600 font-black text-2xl tracking-tighter">[{caseData.orderNo}]</p>
                                        <p className="text-sm font-bold text-slate-500 flex items-center gap-1"><Icon name="map-pin" className="w-3 h-3" /> {caseData.address}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">總樘數</p>
                                        <p className="text-3xl font-black text-slate-900">{caseData.items?.length || 0}</p>
                                    </div>
                                </div>

                                {caseData.videoLink ? (
                                    <div className="bg-black rounded-2xl overflow-hidden shadow-2xl aspect-video border-4 border-white relative">
                                        <video src={caseData.videoLink} controls playsInline className="w-full h-full object-contain"></video>
                                    </div>
                                ) : (
                                    <div className="card p-12 text-center text-slate-300 font-black italic border-dashed border-2">本案場無影片紀錄</div>
                                )}

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100 shadow-sm">
                                        <label className="text-[10px] block mb-1 uppercase font-black text-orange-400 tracking-widest">門框樣式</label>
                                        <p className="font-black text-orange-900 text-lg">{caseData.frameStyle || '同門片'}</p>
                                    </div>
                                    <div className="bg-orange-50 p-4 rounded-2xl border border-orange-100 shadow-sm">
                                        <label className="text-[10px] block mb-1 uppercase font-black text-orange-400 tracking-widest">門片樣式</label>
                                        <p className="font-black text-orange-900 text-lg">{caseData.doorStyle || '平烤正白'}</p>
                                    </div>
                                </div>

                                <div className="card overflow-hidden">
                                    <div className="p-3 bg-slate-50 border-b flex justify-between items-center">
                                        <h3 className="section-title italic tracking-widest uppercase">丈量數據列表</h3>
                                    </div>
                                    <div className="overflow-x-auto no-scrollbar">
                                        <table className="w-full text-center border-separate border-spacing-0">
                                            <thead className="bg-slate-50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b">
                                                <tr>
                                                    <th className="p-3 w-10">#</th>
                                                    <th className="p-3 text-blue-600">洞寬</th>
                                                    <th className="p-3 text-blue-600">洞高</th>
                                                    <th className="p-3 bg-emerald-50 text-emerald-600 font-black border-x">門寬(-48)</th>
                                                    <th className="p-3 bg-emerald-50 text-emerald-600 font-black border-r">門高(-30)</th>
                                                    <th className="p-3">牆厚</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y text-slate-700">
                                                {caseData.items?.map((m, i) => (
                                                    <tr key={i} className="hover:bg-blue-50/30 transition-colors">
                                                        <td className="p-4 font-bold text-slate-300 italic">{m.no}</td>
                                                        <td className="p-4 font-bold text-lg">{m.w}</td>
                                                        <td className="p-4 font-bold text-lg">{m.h}</td>
                                                        <td className="p-4 bg-emerald-50/10 font-black text-emerald-600 text-2xl border-x">{m.dw}</td>
                                                        <td className="p-4 bg-emerald-50/10 font-black text-emerald-600 text-2xl border-r">{m.dh}</td>
                                                        <td className="p-4 font-black text-lg text-slate-500">{m.t}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="card p-5 space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-4">
                                            <div className="bg-slate-50 p-3 rounded-xl border">
                                                <label className="text-[10px] font-black text-blue-400 block mb-1 tracking-widest">注意事項</label>
                                                <p className="text-sm font-bold whitespace-pre-wrap leading-relaxed">{caseData.precautions || '無'}</p>
                                            </div>
                                            <div className="bg-slate-50 p-3 rounded-xl border">
                                                <label className="text-[10px] font-black text-blue-400 block mb-1 tracking-widest">訂單備註</label>
                                                <p className="text-sm font-bold whitespace-pre-wrap leading-relaxed">{caseData.orderRemark || '無'}</p>
                                            </div>
                                        </div>
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 flex items-center justify-center min-h-[10rem]">
                                            <div className="text-center">
                                                <label className="text-[10px] font-black text-red-400 block mb-2 uppercase tracking-widest">大紅字警示區</label>
                                                <p className="text-2xl font-black text-red-600 leading-tight">{caseData.redNotice || '無特別警示'}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                        {['partCollision','partHinge','partStop','partHandle'].map((k, i) => (
                                            <div key={k} className="bg-slate-50 p-3 rounded-xl border border-slate-200 text-center shadow-inner">
                                                <label className="text-[9px] font-black text-slate-400 block mb-1">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                                <p className="text-base font-black text-slate-700 truncate">{caseData[k] || '-'}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="mt-auto py-8 text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.4em] italic">Zhiyang Worker View v1.9.1</footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
