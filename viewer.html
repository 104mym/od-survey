<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚下料單 - 師傅查看器</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root">
        <div class="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white italic font-black uppercase">Zhiyang Viewer Loading...</div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, getFirestore, doc, getDoc };
    </script>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [searchNo, setSearchNo] = useState("");
            const [caseData, setCaseData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setIsReady(true), 1000);
                const init = async () => {
                    try {
                        const firebaseConfig = { apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk", authDomain: "tao-men.firebaseapp.com", projectId: "tao-men", storageBucket: "tao-men.firebasestorage.app", messagingSenderId: "332609297071", appId: "1:332609297071:web:03593a930475c97b87525a" };
                        const app = window.FB.initializeApp(firebaseConfig);
                        const auth = window.FB.getAuth(app);
                        setDb(window.FB.getFirestore(app));
                        await window.FB.signInAnonymously(auth);
                        setIsReady(true);
                        clearTimeout(timer);
                    } catch (e) { setIsReady(true); }
                };
                init();
            }, []);

            const handleSearch = async () => {
                if (!db || !searchNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-app', 'public', 'data', 'cases', searchNo);
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) setCaseData(snap.data());
                    else alert("找不到此編號");
                } catch (e) { alert("查詢失敗，可能是雲端庫未開通。"); }
                finally { setIsLoading(false); }
            };

            useEffect(() => { if(isReady) lucide.createIcons(); }, [caseData, isReady]);

            if (!isReady) return null;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <nav className="bg-slate-900 text-white p-4 shadow-xl flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-lg font-black italic tracking-tighter uppercase">智揚 <span className="text-emerald-400 text-sm">Viewer</span></h1>
                    </nav>
                    <main className="p-4 lg:p-8 max-w-5xl mx-auto w-full space-y-6">
                        <div className="bg-white rounded-[2rem] p-8 shadow-sm border text-center">
                            <div className="flex gap-2 max-w-md mx-auto">
                                <input placeholder="輸入訂單編號" value={searchNo} onChange={e=>setSearchNo(e.target.value)} className="flex-1 px-5 py-3 bg-slate-50 border rounded-2xl text-sm font-black text-indigo-600 outline-none" />
                                <button onClick={handleSearch} disabled={isLoading} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-sm">查詢</button>
                            </div>
                        </div>
                        {caseData && (
                            <div className="space-y-6">
                                <div className="bg-white p-8 rounded-[2rem] shadow-sm border grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase">安裝地址</label><p className="font-bold text-slate-700">{caseData.address}</p></div>
                                    <div className="text-right"><label className="text-[10px] font-black text-slate-400 uppercase">總樘數</label><p className="text-2xl font-black text-blue-600">{caseData.items?.length || 0}</p></div>
                                </div>
                                <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                    <table className="w-full text-left min-w-[800px] border-separate border-spacing-0">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase">
                                            <tr><th className="px-6 py-4">編號</th><th className="px-4 py-4 text-emerald-600">門寬(-48)</th><th className="px-4 py-4 text-emerald-600">門高(-30)</th><th className="px-4 py-4">牆厚</th><th className="px-6 py-4">樣式 / 備註</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {caseData.items?.map((m, i) => (
                                                <tr key={i} className="hover:bg-slate-50">
                                                    <td className="px-6 py-4 font-black text-slate-400 text-xs">{m.no}</td>
                                                    <td className="px-4 py-4 font-black text-emerald-600 text-2xl">{m.dw}</td>
                                                    <td className="px-4 py-4 font-black text-emerald-600 text-2xl">{m.dh}</td>
                                                    <td className="px-4 py-4 font-bold text-slate-700 text-lg">{m.t}</td>
                                                    <td className="px-6 py-4 text-xs font-black italic text-red-500">{m.note}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
