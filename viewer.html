<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚下料單 - 師傅純讀取版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .section-title { border-left: 5px solid #2563eb; padding-left: 12px; font-weight: 900; color: #1e293b; letter-spacing: 1px; font-size: 1.1rem; }
        .card { background: white; border-radius: 2rem; box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; overflow: hidden; }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 12px; padding: 3px 6px; border-radius: 5px; font-weight: 900; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, getFirestore, doc, getDoc };
    </script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const temp = document.createElement('div');
                    temp.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: temp });
                    const svg = temp.querySelector('svg');
                    if (svg) {
                        if (className) className.split(' ').forEach(c => { if (c.trim()) svg.classList.add(c.trim()); });
                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [searchNo, setSearchNo] = useState("");
            const [caseData, setCaseData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [logoImgBase64, setLogoImgBase64] = useState("");

            const firebaseConfig = {
                apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                authDomain: "tao-men.firebaseapp.com",
                projectId: "tao-men",
                storageBucket: "tao-men.firebasestorage.app",
                messagingSenderId: "332609297071",
                appId: "1:332609297071:web:03593a930475c97b87525a"
            };

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 200, 200);
                    ctx.beginPath(); ctx.arc(100, 85, 70, 0, 2 * Math.PI);
                    ctx.lineWidth = 14; ctx.strokeStyle = 'black'; ctx.stroke();
                    ctx.font = '900 90px "Noto Serif TC", serif'; ctx.fillStyle = 'black';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 100, 95);
                    ctx.font = '900 24px "Noto Sans TC", sans-serif'; ctx.fillText('門扉美學館', 100, 185);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            useEffect(() => {
                getLogoBase64().then(url => setLogoImgBase64(url));

                const init = async () => {
                    try {
                        const app = window.FB.initializeApp(firebaseConfig);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        setIsReady(true);
                        const auth = window.FB.getAuth(app);
                        window.FB.signInAnonymously(auth).catch(e => console.warn("Auth skipped"));
                    } catch (e) { setIsReady(true); }
                };
                init();
            }, []);

            const handleSearch = async () => {
                if (!db || !searchNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-survey-system', 'public', 'data', 'cases', searchNo);
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) setCaseData(snap.data());
                    else alert("找不到案場，請確認編號。");
                } catch (e) { alert("讀取失敗"); }
                finally { setIsLoading(false); }
            };

            const handleBack = () => {
                setCaseData(null);
                setSearchNo("");
            };

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-black text-xl uppercase animate-pulse">連線中...</div>;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-10">
                    <nav className="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center w-full">
                            <div className="flex items-center gap-2">
                                {logoImgBase64 ? (
                                    <div className="bg-white p-1 rounded-lg shadow">
                                        <img src={logoImgBase64} alt="Logo" className="w-8 h-8 object-contain" />
                                    </div>
                                ) : (
                                    <div className="bg-blue-600 p-1.5 rounded-lg"><Icon name="shield-check" className="w-5 h-5" /></div>
                                )}
                                <div>
                                    <h1 className="text-xl font-black italic tracking-tighter uppercase leading-none">智揚助理</h1>
                                    <span className="text-[9px] font-bold text-emerald-400 uppercase tracking-widest">師傅查看端</span>
                                </div>
                            </div>
                            
                            {caseData && (
                                <button onClick={handleBack} className="bg-slate-800 text-white px-3 py-2 rounded-xl text-xs font-black flex items-center gap-1 transition-all active:scale-95 border border-slate-700">
                                    <Icon name="chevron-left" className="w-4 h-4" /> 返回
                                </button>
                            )}
                        </div>
                    </nav>

                    <main className="p-3 lg:p-8 max-w-7xl mx-auto w-full space-y-6 mt-2">
                        
                        {!caseData ? (
                            <div className="bg-white rounded-[1.5rem] p-6 shadow-sm border text-center space-y-4 animate-in fade-in zoom-in duration-300 max-w-lg mx-auto mt-10">
                                <label className="text-xs font-black text-slate-400 uppercase font-bold tracking-widest block">請輸入訂單編號</label>
                                <div className="flex gap-2 mx-auto">
                                    <input placeholder="例如: 20260502" value={searchNo} onChange={e=>setSearchNo(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSearch()} className="flex-1 px-4 py-3 bg-slate-50 border rounded-xl text-lg font-black text-indigo-600 outline-none" />
                                    <button onClick={handleSearch} disabled={isLoading} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-base transition-all active:scale-95">
                                        {isLoading ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : "查詢"}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-right-4 fade-in duration-400">
                                
                                {/* 案場簡介 - 字體微縮 */}
                                <div className="card p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">訂單編號</label>
                                        <div className="w-full border-b border-slate-100 p-1 text-xl font-black text-blue-600 truncate">{caseData.orderNo}</div>
                                    </div>
                                    <div className="lg:col-span-2 space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">案場地址</label>
                                        <div className="w-full border-b border-slate-100 p-1 text-xl font-bold text-slate-700 truncate">{caseData.address}</div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">聯絡人</label>
                                        <div className="w-full border-b border-slate-100 p-1 text-lg font-bold text-slate-700 truncate">{caseData.contact} {caseData.phone}</div>
                                    </div>
                                    <div className="bg-blue-50 rounded-xl p-3 flex flex-col justify-center items-center border border-blue-100">
                                        <label className="text-[9px] font-black text-blue-400 uppercase tracking-widest leading-none">總筆數</label>
                                        <div className="text-3xl font-black text-blue-600">{caseData.items?.length || 0}</div>
                                    </div>
                                </div>

                                {caseData.videoLink && (
                                    <div className="bg-black rounded-[1.5rem] overflow-hidden shadow-xl aspect-video max-w-2xl mx-auto border-4 border-white relative">
                                        <video src={caseData.videoLink} controls className="w-full h-full object-cover"></video>
                                    </div>
                                )}

                                {/* 樣式 - 字體微縮 */}
                                <div className="bg-orange-50 rounded-[1.5rem] p-6 border border-orange-100 grid grid-cols-2 gap-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-orange-400 uppercase tracking-widest">門框樣式</label>
                                        <div className="w-full border-b border-orange-200 p-1 text-lg font-bold text-orange-900">{caseData.frameStyle || '無'}</div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-orange-400 uppercase tracking-widest">門片樣式</label>
                                        <div className="w-full border-b border-orange-200 p-1 text-lg font-bold text-orange-900">{caseData.doorStyle || '無'}</div>
                                    </div>
                                </div>

                                {/* 表格 - 數據縮小一點 */}
                                <div className="card overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b border-slate-100">
                                        <h3 className="section-title italic">丈量數據明細表</h3>
                                    </div>
                                    <div className="overflow-x-auto no-scrollbar">
                                        <table className="w-full text-left min-w-[900px] border-separate border-spacing-0">
                                            <thead className="bg-slate-50 text-[10px] text-slate-400 font-black uppercase sticky top-0 z-20 shadow-sm border-b">
                                                <tr>
                                                    <th className="px-6 py-4">編號</th>
                                                    <th className="px-4 py-4 text-blue-700">洞寬 (W)</th>
                                                    <th className="px-4 py-4 text-blue-700">洞高 (H)</th>
                                                    <th className="px-4 py-4 text-emerald-600 border-x border-slate-100">門寬 (成品)</th>
                                                    <th className="px-4 py-4 text-emerald-600 border-r border-slate-100">門高 (成品)</th>
                                                    <th className="px-4 py-4 text-center">牆厚 (T)</th>
                                                    <th className="px-8 py-4">現場備註</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {caseData.items?.map(m => (
                                                    <tr key={m.id} className="hover:bg-blue-50/30 transition-all">
                                                        <td className="px-6 py-6 font-bold text-slate-400 text-lg italic">{m.no}</td>
                                                        <td className="px-4 py-6 text-xl font-black text-blue-800">{m.w}</td>
                                                        <td className="px-4 py-6 text-xl font-black text-blue-800">{m.h}</td>
                                                        <td className="px-4 py-6 bg-emerald-50/30 font-black text-emerald-600 text-4xl tracking-tighter text-center border-x border-slate-100">{m.dw}</td>
                                                        <td className="px-4 py-6 bg-emerald-50/30 font-black text-emerald-600 text-4xl tracking-tighter text-center border-r border-slate-100">{m.dh}</td>
                                                        <td className="px-4 py-6 text-xl font-bold text-slate-700 text-center">{m.t}</td>
                                                        <td className="px-8 py-6">
                                                            <div className="flex gap-2 mb-1">
                                                                <span className="badge">{m.style || '房'}</span>
                                                                <span className="badge">隱止</span>
                                                            </div>
                                                            <div className="text-xs text-red-600 font-black italic">{m.note || '無備註'}</div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* 五金配件 - 字體微縮 */}
                                <div className="card p-8 space-y-8">
                                    <h3 className="section-title uppercase tracking-widest">五金配件與精密備註</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-blue-500 uppercase">框門注意事項</label>
                                                <div className="w-full bg-slate-50 border rounded-xl p-4 text-base font-bold min-h-[4rem] whitespace-pre-wrap">{caseData.precautions || '無'}</div>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-blue-500 uppercase">訂單備註</label>
                                                <div className="w-full bg-slate-50 border rounded-xl p-4 text-base font-bold min-h-[4rem] whitespace-pre-wrap">{caseData.orderRemark || '無'}</div>
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-red-500 italic uppercase font-black">大紅字警示區</label>
                                            <div className="w-full bg-red-50/30 border border-red-100 rounded-[2rem] p-5 text-red-600 font-black text-2xl text-center leading-relaxed shadow-inner min-h-[10rem] flex items-center justify-center whitespace-pre-wrap">{caseData.redNotice || '無特別警示'}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                        {['partCollision','partHinge','partStop','partHandle'].map((key, i) => (
                                            <div key={key} className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm text-center">
                                                <label className="text-[10px] font-black text-slate-400 mb-2 block uppercase">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                                <div className="w-full bg-white border rounded-xl p-3 text-xl font-black text-slate-700 min-h-[6rem] flex items-center justify-center whitespace-pre-wrap leading-tight">{caseData[key] || ''}</div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="flex justify-end gap-4 items-center pt-6 border-t border-slate-100">
                                        <label className="text-lg font-black text-slate-600 uppercase">訂金金額:</label>
                                        <div className="min-w-[10rem] bg-slate-100 p-3 rounded-xl text-right font-black text-blue-600 text-2xl">{caseData.deposit || '0'}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-auto py-8 text-center opacity-20 text-[9px] font-black uppercase tracking-[0.4em]">
                        Zhiyang Official Worker Viewer v13.5
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
