<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智揚下料單 - 師傅查看器</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .section-title { border-left: 4px solid #2563eb; padding-left: 10px; font-weight: 900; color: #1e293b; letter-spacing: 0.5px; font-size: 1rem; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.05); border: 1px solid #e2e8f0; overflow: hidden; }
        .badge { background: #e0f2fe; color: #0369a1; font-size: 11px; padding: 2px 5px; border-radius: 4px; font-weight: 900; }
        @media (max-width: 640px) {
            .main-container { padding-left: 0.5rem; padding-right: 0.5rem; }
            .search-card { padding: 1.25rem 1rem !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, signInAnonymously, getFirestore, doc, getDoc };
    </script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const temp = document.createElement('div');
                    temp.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: temp });
                    const svg = temp.querySelector('svg');
                    if (svg) {
                        if (className) className.split(' ').forEach(c => { if (c.trim()) svg.classList.add(c.trim()); });
                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [isReady, setIsReady] = useState(false);
            const [db, setDb] = useState(null);
            const [searchNo, setSearchNo] = useState("");
            const [caseData, setCaseData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [logoImgBase64, setLogoImgBase64] = useState("");

            const firebaseConfig = {
                apiKey: "AIzaSyBEcCQcuwCh30xDmj3wE-3CM2YffgIxfAk",
                authDomain: "tao-men.firebaseapp.com",
                projectId: "tao-men",
                storageBucket: "tao-men.firebasestorage.app",
                messagingSenderId: "332609297071",
                appId: "1:332609297071:web:03593a930475c97b87525a"
            };

            const getLogoBase64 = async () => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 160; canvas.height = 160;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 160, 160);
                    ctx.beginPath(); ctx.arc(80, 70, 60, 0, 2 * Math.PI);
                    ctx.lineWidth = 10; ctx.strokeStyle = 'black'; ctx.stroke();
                    ctx.font = '900 70px "Noto Serif TC", serif'; ctx.fillStyle = 'black';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('匠', 80, 78);
                    ctx.font = '900 18px "Noto Sans TC", sans-serif'; ctx.fillText('門扉美學館', 80, 145);
                    resolve(canvas.toDataURL('image/png'));
                });
            };

            useEffect(() => {
                getLogoBase64().then(url => setLogoImgBase64(url));
                const init = async () => {
                    try {
                        const app = window.FB.initializeApp(firebaseConfig);
                        const firestore = window.FB.getFirestore(app);
                        setDb(firestore);
                        setIsReady(true);
                        const auth = window.FB.getAuth(app);
                        window.FB.signInAnonymously(auth).catch(e => console.warn("Auth skipped"));
                    } catch (e) { setIsReady(true); }
                };
                init();
            }, []);

            const handleSearch = async () => {
                if (!db || !searchNo) return;
                setIsLoading(true);
                try {
                    const docRef = window.FB.doc(db, 'artifacts', 'od-survey-system', 'public', 'data', 'cases', searchNo);
                    const snap = await window.FB.getDoc(docRef);
                    if (snap.exists()) setCaseData(snap.data());
                    else alert("找不到案場，請確認編號是否正確。");
                } catch (e) { alert("讀取失敗"); }
                finally { setIsLoading(false); }
            };

            const handleBack = () => {
                setCaseData(null);
                setSearchNo("");
            };

            if (!isReady) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-bold text-lg animate-pulse uppercase">系統啟動中...</div>;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col pb-10">
                    <nav className="bg-slate-900 text-white p-3 shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center w-full">
                            <div className="flex items-center gap-2">
                                {logoImgBase64 && <img src={logoImgBase64} alt="Logo" className="w-8 h-8 object-contain rounded bg-white p-0.5 shadow" />}
                                <div>
                                    <h1 className="text-lg font-black tracking-tight leading-none italic">智揚助理</h1>
                                    <span className="text-[8px] font-bold text-emerald-400 uppercase tracking-widest leading-none">Worker View</span>
                                </div>
                            </div>
                            {caseData && (
                                <button onClick={handleBack} className="bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-1 border border-white/10 active:scale-95 transition-all">
                                    <Icon name="chevron-left" className="w-3 h-3" /> 返回
                                </button>
                            )}
                        </div>
                    </nav>

                    <main className="main-container max-w-7xl mx-auto w-full space-y-4 mt-2">
                        
                        {!caseData ? (
                            <div className="card search-card p-6 text-center space-y-4 max-w-md mx-auto mt-10">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] block">請輸入訂單編號查詢</label>
                                <div className="flex gap-2 w-full">
                                    <input 
                                        placeholder="20260502" 
                                        value={searchNo} 
                                        onChange={e=>setSearchNo(e.target.value)} 
                                        onKeyDown={e=>e.key==='Enter'&&handleSearch()} 
                                        className="flex-1 min-w-0 px-3 py-2 bg-slate-50 border rounded-xl text-base font-bold text-indigo-600 outline-none focus:ring-2 focus:ring-indigo-100" 
                                    />
                                    <button 
                                        onClick={handleSearch} 
                                        disabled={isLoading} 
                                        className="shrink-0 bg-slate-900 text-white px-4 py-2 rounded-xl font-black text-sm active:scale-95 transition-all flex items-center justify-center gap-1 min-w-[70px]"
                                    >
                                        {isLoading ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : "查詢"}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in slide-in-from-right-2 fade-in duration-300 px-1">
                                
                                {/* 案場簡介 */}
                                <div className="card p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
                                    <div className="lg:col-span-2">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">訂單編號 / 地址</label>
                                        <div className="flex items-baseline gap-2">
                                            <span className="text-sm font-black text-blue-600 tracking-tighter">[{caseData.orderNo}]</span>
                                            <span className="text-sm font-bold text-slate-700 truncate">{caseData.address}</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">聯絡人</label>
                                        <div className="text-sm font-bold text-slate-700 truncate">{caseData.contact} {caseData.phone}</div>
                                    </div>
                                    <div className="bg-blue-50 rounded-xl p-2 flex justify-between items-center px-4 border border-blue-100">
                                        <label className="text-[9px] font-black text-blue-400 uppercase leading-none">總樘數</label>
                                        <div className="text-xl font-black text-blue-600">{caseData.items?.length || 0}</div>
                                    </div>
                                </div>

                                {caseData.videoLink && (
                                    <div className="bg-black rounded-2xl overflow-hidden shadow-lg aspect-video max-w-2xl mx-auto border-4 border-white relative">
                                        <video src={caseData.videoLink} controls className="w-full h-full object-cover"></video>
                                    </div>
                                )}

                                {/* 樣式 */}
                                <div className="bg-orange-50 rounded-2xl p-4 border border-orange-100 grid grid-cols-2 gap-4 shadow-inner">
                                    <div>
                                        <label className="text-[9px] font-black text-orange-400 uppercase tracking-widest block">門框樣式</label>
                                        <div className="text-sm font-bold text-orange-900 border-b border-orange-200">{caseData.frameStyle || '無'}</div>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-orange-400 uppercase tracking-widest block">門片樣式</label>
                                        <div className="text-sm font-bold text-orange-900 border-b border-orange-200">{caseData.doorStyle || '無'}</div>
                                    </div>
                                </div>

                                {/* 表格 */}
                                <div className="card overflow-hidden">
                                    <div className="p-3 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                                        <h3 className="section-title italic">丈量明細表</h3>
                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest italic">MM Unit</span>
                                    </div>
                                    <div className="overflow-x-auto no-scrollbar">
                                        <table className="w-full text-left min-w-[650px] border-separate border-spacing-0">
                                            <thead className="bg-slate-50 text-[9px] text-slate-400 font-black uppercase sticky top-0 z-20 shadow-sm border-b">
                                                <tr>
                                                    <th className="px-4 py-3 w-10 text-center">#</th>
                                                    <th className="px-2 py-3 text-blue-700 w-20">洞寬 W</th>
                                                    <th className="px-2 py-3 text-blue-700 w-20">洞高 H</th>
                                                    <th className="px-2 py-3 text-emerald-600 border-x border-slate-100 bg-emerald-50/30 w-24 text-center">門寬(-48)</th>
                                                    <th className="px-2 py-3 text-emerald-600 border-r border-slate-100 bg-emerald-50/30 w-24 text-center">門高(-30)</th>
                                                    <th className="px-2 py-3 text-center w-16">牆厚 T</th>
                                                    <th className="px-4 py-3">備註</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 text-sm">
                                                {caseData.items?.map(m => (
                                                    <tr key={m.id} className="hover:bg-blue-50/30 transition-all">
                                                        <td className="px-4 py-4 font-bold text-slate-300 text-xs text-center italic">{m.no}</td>
                                                        <td className="px-2 py-4 font-bold text-slate-500">{m.w}</td>
                                                        <td className="px-2 py-4 font-bold text-slate-500">{m.h}</td>
                                                        <td className="px-2 py-4 bg-emerald-50/30 font-black text-emerald-600 text-2xl tracking-tighter text-center border-x border-slate-100">{m.dw}</td>
                                                        <td className="px-2 py-4 bg-emerald-50/30 font-black text-emerald-600 text-2xl tracking-tighter text-center border-r border-slate-100">{m.dh}</td>
                                                        <td className="px-2 py-4 text-lg font-black text-slate-700 text-center">{m.t}</td>
                                                        <td className="px-4 py-4">
                                                            <div className="flex gap-1 mb-1">
                                                                <span className="badge">{m.style || '房'}</span>
                                                                <span className="badge">隱止</span>
                                                            </div>
                                                            <div className="text-[11px] text-red-600 font-bold leading-tight line-clamp-2">{m.note || '無'}</div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* 五金配件 */}
                                <div className="card p-5 space-y-6">
                                    <h3 className="section-title uppercase tracking-widest">五金零件與備註</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-3">
                                            <div>
                                                <label className="text-[9px] font-black text-blue-500 uppercase tracking-widest">框門注意事項</label>
                                                <div className="w-full bg-slate-50 border rounded-xl p-3 text-sm font-bold min-h-[3rem] whitespace-pre-wrap">{caseData.precautions || '無'}</div>
                                            </div>
                                            <div>
                                                <label className="text-[9px] font-black text-blue-500 uppercase tracking-widest">訂單備註</label>
                                                <div className="w-full bg-slate-50 border rounded-xl p-3 text-sm font-bold min-h-[3rem] whitespace-pre-wrap">{caseData.orderRemark || '無'}</div>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black text-red-500 italic uppercase tracking-widest">大紅字警示區</label>
                                            <div className="w-full bg-red-50/40 border border-red-100 rounded-2xl p-4 text-red-600 font-black text-xl text-center leading-normal shadow-inner min-h-[8rem] flex items-center justify-center whitespace-pre-wrap">{caseData.redNotice || '無特別警示'}</div>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                        {['partCollision','partHinge','partStop','partHandle'].map((key, i) => (
                                            <div key={key} className="bg-slate-50 p-3 rounded-xl border border-slate-200 shadow-sm text-center">
                                                <label className="text-[9px] font-black text-slate-400 mb-1 block uppercase tracking-tighter">{['防撞條','鉸鏈','門止','把手'][i]}</label>
                                                <div className="w-full bg-white border rounded-lg p-2 text-base font-black text-slate-700 min-h-[4rem] flex items-center justify-center whitespace-pre-wrap leading-tight">{caseData[key] || ''}</div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="flex justify-end gap-3 items-center pt-4 border-t border-slate-100">
                                        <label className="text-sm font-black text-slate-400 uppercase tracking-widest">訂金金額</label>
                                        <div className="min-w-[8rem] bg-slate-100 p-2 rounded-lg text-right font-black text-blue-600 text-xl tracking-tighter shadow-inner">{caseData.deposit || '0'}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-auto py-8 text-center opacity-20 text-[8px] font-black uppercase tracking-[0.4em]">
                        Zhiyang Official Worker Viewer v14.5
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
